<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inquiries - Employee Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="dashboard-wrapper">
    <header class="top-header">
        <div class="header-left">
            <button class="mobile-menu-toggle" onclick="toggleMobileSidebar()" title="Toggle Sidebar">
                <i class="fas fa-bars"></i>
            </button>
            <button class="sidebar-expand-toggle" onclick="toggleSidebar()" title="Expand/Collapse Sidebar">
                <i class="fas fa-bars"></i>
            </button>
        </div>
        <div class="company-name">Potens Green</div>
        <form th:action="@{/logout}" method="post" style="display: inline;">
            <button type="submit" class="logout-btn">Logout</button>
        </form>
    </header>

    <div th:replace="~{fragments/admin-sidebar :: sidebar}"></div>

    <main class="main-content">
        <div class="container">

            <div class="d-flex justify-content-between align-items-center mb-4">
                <h1>Inquiries</h1>
            </div>

            <div class="card">
                <div class="card-body">

                    <table class="table" th:if="${inquiries != null and !inquiries.isEmpty()}">
                        <thead>
                        <tr>
                            <th>#</th>
                            <th>Name</th>
                            <th>Mobile</th>
                            <th>District</th>
<!--                            <th>Message</th>-->
                            <th>Interested In</th>
                            <th>Created At</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="inq, stat : ${inquiries}">
                            <td th:text="${stat.count}">1</td>
                            <td th:text="${inq.name}">-</td>
                            <td th:text="${inq.mobileNo}">-</td>
                            <td th:text="${inq.district}">-</td>
<!--                            <td th:text="${inq.message}">-</td>-->
                            <td th:text="${inq.interestedIn}">-</td>
                            <td th:text="${inq.createdAt != null ? #temporals.format(inq.createdAt,'yyyy-MM-dd HH:mm') : '-'}">-</td>
                        </tr>
                        </tbody>
                    </table>

                    <div class="empty-state" th:if="${inquiries == null or inquiries.isEmpty()}">
                        <p>No inquiries found.</p>
                    </div>

                </div>
            </div>

        </div>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/sidebar.js}"></script>
</body>
</html>



<th>ID</th>
<th>Name</th>
<th>Mobile</th>
<th>District</th>
<th>Interested In</th>
<th>Created At</th>
