<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salary Details - Employee Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" th:href="@{/employee/dashboard}">Employee Portal</a>
        </div>
    </nav>

    <div class="container">
        <h1 class="mb-4 mt-4">Salary Details</h1>

        <div class="card">
            <div class="card-body">
                <h5 class="mb-3">Salary for <span th:text="${#temporals.format(salary.salaryMonth, 'MMMM yyyy')}"></span></h5>
                
                <div class="row">
                    <div class="col-md-6">
                        <table class="table">
                            <tr>
                                <th>Employee:</th>
                                <td th:text="${employee.fullName}"></td>
                            </tr>
                            <tr>
                                <th>Employee ID:</th>
                                <td th:text="${employee.username}"></td>
                            </tr>
                            <tr>
                                <th>Salary Month:</th>
                                <td th:text="${#temporals.format(salary.salaryMonth, 'MMMM yyyy')}"></td>
                            </tr>
                            <tr>
                                <th>Status:</th>
                                <td>
                                    <span class="badge" 
                                          th:classappend="${salary.status == 'PAID'} ? 'badge-success' : 
                                                          (${salary.status == 'PROCESSED'} ? 'badge-info' : 'badge-warning')"
                                          th:text="${salary.status}">PENDING</span>
                                </td>
                            </tr>
                        </table>
                    </div>
                    <div class="col-md-6">
                        <h6>Salary Breakdown</h6>
                        <table class="table">
                            <tr>
                                <th>Basic Salary:</th>
                                <td th:text="${'$' + #numbers.formatDecimal(salary.basicSalary, 0, 'COMMA', 2, 'POINT')}"></td>
                            </tr>
                            <tr th:if="${salary.allowances != null}">
                                <th>Allowances:</th>
                                <td th:text="${'$' + #numbers.formatDecimal(salary.allowances, 0, 'COMMA', 2, 'POINT')}"></td>
                            </tr>
                            <tr th:if="${salary.bonus != null}">
                                <th>Bonus:</th>
                                <td th:text="${'$' + #numbers.formatDecimal(salary.bonus, 0, 'COMMA', 2, 'POINT')}"></td>
                            </tr>
                            <tr th:if="${salary.overtime != null}">
                                <th>Overtime:</th>
                                <td th:text="${'$' + #numbers.formatDecimal(salary.overtime, 0, 'COMMA', 2, 'POINT')}"></td>
                            </tr>
                            <tr th:if="${salary.deductions != null}">
                                <th>Deductions:</th>
                                <td class="text-danger" th:text="${'-$' + #numbers.formatDecimal(salary.deductions, 0, 'COMMA', 2, 'POINT')}"></td>
                            </tr>
                            <tr class="table-primary">
                                <th><strong>Net Salary:</strong></th>
                                <td><strong th:text="${'$' + #numbers.formatDecimal(salary.netSalary, 0, 'COMMA', 2, 'POINT')}"></strong></td>
                            </tr>
                        </table>
                    </div>
                </div>

                <div class="mt-4" th:if="${salary.payslipPath != null and !salary.payslipPath.isEmpty()}">
                    <a th:href="@{/employee/salary/download/{id}(id=${salary.id})}" class="btn btn-primary">Download Payslip</a>
                </div>

                <div class="mt-4">
                    <a th:href="@{/employee/salary}" class="btn btn-secondary">Back to List</a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
