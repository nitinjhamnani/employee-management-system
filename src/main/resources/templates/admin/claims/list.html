<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claims Management - Employee Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="dashboard-wrapper">
        <div th:replace="~{fragments/admin-header :: header}"></div>
        <div th:replace="~{fragments/admin-sidebar :: sidebar}"></div>
        <main class="main-content">
            <div class="container">
                <div th:if="${message}" class="alert alert-success alert-dismissible fade show" role="alert">
                    <span th:text="${message}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
                <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                    <span th:text="${error}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>

                <div class="d-flex justify-content-between align-items-center mb-4 mt-4">
                    <h1><i class="fas fa-file-invoice-dollar"></i> Approved Claims</h1>
                </div>

                <div class="card mb-4">
                    <div class="card-body">
                        <form th:action="@{/admin/claims}" method="get" class="row g-3">
                            <div class="col-md-10">
                                <input type="text" name="search" class="form-control" placeholder="Search by employee name, claim type, or description..." th:value="${searchQuery}">
                            </div>
                            <div class="col-md-2">
                                <button type="submit" class="btn btn-primary w-100">
                                    <i class="fas fa-search"></i> Search
                                </button>
                            </div>
                        </form>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">Approved Claims List</div>
                    <div class="card-body">
                        <div th:if="${claims != null and !claims.isEmpty()}">
                            <div class="table-responsive">
                                <table class="table table-striped table-hover">
                                    <thead>
                                        <tr>
                                            <th>Claim ID</th>
                                            <th>Employee</th>
                                            <th>Claim Type</th>
                                            <th>Amount</th>
                                            <th>Claim Date</th>
                                            <th>Approved By</th>
                                            <th>Approved At</th>
                                            <th>Payment Status</th>
                                            <th>Actions</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr th:each="claim : ${claims}">
                                            <td th:text="${claim.id}"></td>
                                            <td th:text="${claim.employee.fullName}"></td>
                                            <td><span class="badge bg-info" th:text="${claim.claimType}"></span></td>
                                            <td><strong>₹<span th:text="${#numbers.formatDecimal(claim.amount, 0, 'COMMA', 2, 'POINT')}"></span></strong></td>
                                            <td th:text="${#temporals.format(claim.claimDate, 'dd MMM yyyy')}"></td>
                                            <td th:text="${claim.approvedBy != null ? claim.approvedBy.fullName : 'N/A'}"></td>
                                            <td th:text="${claim.approvedAt != null ? #temporals.format(claim.approvedAt, 'dd MMM yyyy HH:mm') : '-'}"></td>
                                            <td>
                                                <span class="badge" 
                                                      th:classappend="${claim.isPaid == true} ? 'bg-success' : 'bg-warning'"
                                                      th:text="${claim.isPaid == true ? 'Paid' : 'Unpaid'}">Unpaid</span>
                                            </td>
                                            <td>
                                                <a th:href="@{/admin/claims/view/{id}(id=${claim.id})}" class="btn btn-info btn-sm">
                                                    <i class="fas fa-eye"></i> View
                                                </a>
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                        <div th:if="${claims == null or claims.isEmpty()}" class="empty-state text-center py-5">
                            <i class="fas fa-inbox fa-3x text-muted mb-3"></i>
                            <p class="text-muted">No approved claims found.</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/sidebar.js}"></script>
</body>
</html>
