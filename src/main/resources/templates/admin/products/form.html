<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${product.id != null ? 'Edit Product' : 'Add Product'}">Product Form - Employee Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="dashboard-wrapper">
        <div th:replace="~{fragments/admin-header :: header}"></div>

        <div th:replace="~{fragments/admin-sidebar :: sidebar}"></div>

        <main class="main-content">
            <div class="container">
        <div th:if="${message}" class="alert alert-success">
            <span th:text="${message}"></span>
        </div>
        <div th:if="${error}" class="alert alert-danger">
            <span th:text="${error}"></span>
        </div>
        <h1 class="mb-4" th:text="${product.id != null ? 'Edit Product' : 'Add New Product'}">Add Product</h1>

        <div class="card">
            <div class="card-body">
                <form th:action="@{/admin/products/save}" th:object="${product}" method="post">
                    <input type="hidden" th:field="*{id}">
                    
                    <div class="alert alert-info" th:if="${product.id == null}">
                        <strong>Note:</strong> Product ID will be automatically generated starting with "PG" followed by 6 alphanumeric characters (8 characters total).
                    </div>
                    <div class="alert alert-info" th:if="${product.id != null}">
                        <strong>Product ID:</strong> <span th:text="${product.productId}">-</span>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-12">
                            <div class="form-group mb-3">
                                <label class="form-label">Product Name *</label>
                                <input type="text" class="form-control" th:field="*{name}" required placeholder="e.g., Diesel Fuel">
                                <span class="text-danger" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></span>
                            </div>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-12">
                            <div class="form-group mb-3">
                                <label class="form-label">Description</label>
                                <textarea class="form-control" rows="3" th:field="*{description}" placeholder="Product description..."></textarea>
                            </div>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6">
                            <div class="form-group mb-3">
                                <label class="form-label">Unit Price (INR) *</label>
                                <div class="input-group">
                                    <span class="input-group-text">₹</span>
                                    <input type="number" class="form-control" th:field="*{unitPrice}" step="0.01" min="0.01" required placeholder="0.00">
                                </div>
                                <span class="text-danger" th:if="${#fields.hasErrors('unitPrice')}" th:errors="*{unitPrice}"></span>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group mb-3">
                                <label class="form-label">Status *</label>
                                <select class="form-select" th:field="*{status}" required>
                                    <option value="ACTIVE">ACTIVE</option>
                                    <option value="INACTIVE">INACTIVE</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6">
                            <div class="form-group mb-3">
                                <label class="form-label">Commission Type *</label>
                                <select class="form-select" th:field="*{commissionType}" id="commissionType" required onchange="updateCommissionLabel()">
                                    <option value="">-- Select Commission Type --</option>
                                    <option value="FIXED">Fixed Amount</option>
                                    <option value="PERCENTAGE">Percentage</option>
                                </select>
                                <span class="text-danger" th:if="${#fields.hasErrors('commissionType')}" th:errors="*{commissionType}"></span>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group mb-3">
                                <label class="form-label" id="commissionValueLabel">Commission Value *</label>
                                <div class="input-group">
                                    <span class="input-group-text" id="commissionPrefix">₹</span>
                                    <input type="number" class="form-control" th:field="*{commissionValue}" step="0.01" min="0" required placeholder="0.00" id="commissionValue">
                                    <span class="input-group-text" id="commissionSuffix" style="display: none;">%</span>
                                </div>
                                <small class="form-text text-muted" id="commissionHelp">Enter the commission amount or percentage</small>
                                <span class="text-danger" th:if="${#fields.hasErrors('commissionValue')}" th:errors="*{commissionValue}"></span>
                            </div>
                        </div>
                    </div>

                    <div class="alert alert-info" id="commissionPreview" style="display: none;">
                        <strong>Commission Preview:</strong> <span id="commissionDisplay">—</span>
                    </div>

                    <div class="mt-4">
                        <button type="submit" class="btn btn-primary">Save Product</button>
                        <a th:href="@{/admin/products}" class="btn btn-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/sidebar.js}"></script>
    <script>
        function updateCommissionLabel() {
            const type = document.getElementById('commissionType').value;
            const prefix = document.getElementById('commissionPrefix');
            const suffix = document.getElementById('commissionSuffix');
            const help = document.getElementById('commissionHelp');
            const preview = document.getElementById('commissionPreview');
            const display = document.getElementById('commissionDisplay');
            const valueInput = document.getElementById('commissionValue');
            
            if (type === 'FIXED') {
                prefix.style.display = '';
                suffix.style.display = 'none';
                help.textContent = 'Enter the fixed commission amount (e.g., 50.00 for ₹50)';
                valueInput.setAttribute('max', '999999.99');
            } else if (type === 'PERCENTAGE') {
                prefix.style.display = 'none';
                suffix.style.display = '';
                help.textContent = 'Enter the percentage (e.g., 5 for 5%, max 100%)';
                valueInput.setAttribute('max', '100');
            } else {
                prefix.style.display = '';
                suffix.style.display = 'none';
                help.textContent = 'Enter the commission amount or percentage';
                preview.style.display = 'none';
                return;
            }
            
            updateCommissionPreview();
        }
        
        function updateCommissionPreview() {
            const type = document.getElementById('commissionType').value;
            const value = parseFloat(document.getElementById('commissionValue').value) || 0;
            const preview = document.getElementById('commissionPreview');
            const display = document.getElementById('commissionDisplay');
            
            if (type && value > 0) {
                if (type === 'FIXED') {
                    display.textContent = '₹' + value.toFixed(2);
                } else if (type === 'PERCENTAGE') {
                    display.textContent = value.toFixed(2) + '%';
                }
                preview.style.display = '';
            } else {
                preview.style.display = 'none';
            }
        }
        
        document.getElementById('commissionValue').addEventListener('input', updateCommissionPreview);
        document.getElementById('commissionType').addEventListener('change', updateCommissionLabel);
        
        // Initialize on page load
        document.addEventListener('DOMContentLoaded', function() {
            const type = document.getElementById('commissionType').value;
            if (type) {
                updateCommissionLabel();
                updateCommissionPreview();
            }
        });
    </script>
</body>
</html>
