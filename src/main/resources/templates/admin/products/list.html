<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products - Employee Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="dashboard-wrapper">
        <div th:replace="~{fragments/admin-header :: header}"></div>
        <div th:replace="~{fragments/admin-sidebar :: sidebar}"></div>
        <main class="main-content">
            <div class="container">
        <div th:if="${message}" class="alert alert-success">
            <span th:text="${message}"></span>
        </div>
        <div th:if="${error}" class="alert alert-danger">
            <span th:text="${error}"></span>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1>Products</h1>
            <a th:href="@{/admin/products/new}" class="btn btn-primary">Add New Product</a>
        </div>

        <form th:action="@{/admin/products}" method="get" class="search-form mb-3">
            <input type="text" name="search" class="form-control" placeholder="Search products..." th:value="${search}">
            <button type="submit" class="btn btn-primary">Search</button>
            <a th:href="@{/admin/products}" class="btn btn-secondary">Clear</a>
        </form>

        <div class="card">
            <div class="card-body">
                <table class="table" th:if="${products != null and !products.isEmpty()}">
                    <thead>
                        <tr>
                            <th>Product ID</th>
                            <th>Product Name</th>
                            <th>Unit Price</th>
                            <th>Commission</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="product : ${products}">
                            <td><strong th:text="${product.productId != null ? product.productId : 'N/A'}">-</strong></td>
                            <td>
                                <strong th:text="${product.name}"></strong>
                                <br><small class="text-muted" th:text="${product.description}" th:if="${product.description != null and !product.description.isEmpty()}"></small>
                            </td>
                            <td th:text="${'₹' + #numbers.formatDecimal(product.unitPrice, 0, 'COMMA', 2, 'POINT')}"></td>
                            <td>
                                <span class="badge bg-info" th:text="${product.commissionDisplay}">—</span>
                                <br><small class="text-muted" th:text="${product.commissionType}"></small>
                            </td>
                            <td>
                                <span class="badge" 
                                      th:classappend="${product.status == 'ACTIVE'} ? 'badge-success' : 'badge-danger'"
                                      th:text="${product.status}">ACTIVE</span>
                            </td>
                            <td>
                                <div class="action-buttons">
                                    <a th:href="@{/admin/products/view/{id}(id=${product.id})}" class="btn btn-info btn-sm">View</a>
                                    <a th:href="@{/admin/products/edit/{id}(id=${product.id})}" class="btn btn-warning btn-sm">Edit</a>
                                    <a th:href="@{/admin/products/delete/{id}(id=${product.id})}" 
                                       class="btn btn-danger btn-sm"
                                       onclick="return confirm('Are you sure you want to delete this product?')">Delete</a>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
                <div class="empty-state" th:if="${products == null or products.isEmpty()}">
                    <p>No products found.</p>
                    <a th:href="@{/admin/products/new}" class="btn btn-primary mt-3">Add First Product</a>
                </div>
            </div>
        </div>
            </div>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/sidebar.js}"></script>
</body>
</html>
