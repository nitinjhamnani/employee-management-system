<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sale Details - Employee Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" th:href="@{/}">Employee Management</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" th:href="@{/}">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/employees}">Employees</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/attendances}">Attendance</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/customers}">Customers</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/admin/sales}">Sales</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1>Sale Details</h1>
            <div>
                <a th:href="@{/sales/edit/{id}(id=${sale.id})}" class="btn btn-warning">Edit</a>
                <a th:href="@{/admin/sales}" class="btn btn-secondary">Back to List</a>
            </div>
        </div>

        <div class="card">
            <div class="card-body">
                <div class="row">
                    <div class="col-md-6">
                        <h5>Sale Information</h5>
                        <table class="table">
                            <tr>
                                <th>Sale Date:</th>
                                <td th:text="${#temporals.format(sale.saleDate, 'yyyy-MM-dd')}"></td>
                            </tr>
                            <tr>
                                <th>Product/Service:</th>
                                <td th:text="${sale.productName}"></td>
                            </tr>
                            <tr>
                                <th>Quantity:</th>
                                <td th:text="${sale.quantity}"></td>
                            </tr>
                            <tr>
                                <th>Unit Price:</th>
                                <td th:text="${'$' + #numbers.formatDecimal(sale.unitPrice, 0, 'COMMA', 2, 'POINT')}"></td>
                            </tr>
                            <tr>
                                <th>Total Amount:</th>
                                <td><strong th:text="${'$' + #numbers.formatDecimal(sale.totalAmount, 0, 'COMMA', 2, 'POINT')}"></strong></td>
                            </tr>
                            <tr>
                                <th>Status:</th>
                                <td>
                                    <span class="badge" 
                                          th:classappend="${sale.status == 'COMPLETED'} ? 'badge-success' : 
                                                          (${sale.status == 'PENDING'} ? 'badge-warning' : 'badge-danger')"
                                          th:text="${sale.status}">PENDING</span>
                                </td>
                            </tr>
                        </table>
                    </div>
                    <div class="col-md-6">
                        <h5>Related Information</h5>
                        <table class="table">
                            <tr>
                                <th>Employee:</th>
                                <td th:text="${sale.employee.fullName}"></td>
                            </tr>
                            <tr>
                                <th>Contact Person:</th>
                                <td th:text="${sale.customer.contactPerson}"></td>
                            </tr>
                            <tr>
                                <th>Customer Email:</th>
                                <td th:text="${sale.customer.email}"></td>
                            </tr>
                        </table>
                    </div>
                </div>
                <div class="mt-4" th:if="${sale.description != null and !sale.description.isEmpty()}">
                    <h5>Description</h5>
                    <p th:text="${sale.description}"></p>
                </div>
                <div class="mt-4" th:if="${sale.notes != null and !sale.notes.isEmpty()}">
                    <h5>Notes</h5>
                    <p th:text="${sale.notes}"></p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
