<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales - Employee Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="dashboard-wrapper">
        <header class="top-header">
            <div class="header-left">
                <button class="mobile-menu-toggle" onclick="toggleMobileSidebar()" title="Toggle Sidebar">
                    <i class="fas fa-bars"></i>
                </button>
                <button class="sidebar-expand-toggle" onclick="toggleSidebar()" title="Expand/Collapse Sidebar">
                    <i class="fas fa-bars"></i>
                </button>
            </div>
            <div class="company-name">Potens Green</div>
            <form th:action="@{/logout}" method="post" style="display: inline;">
                <button type="submit" class="logout-btn">Logout</button>
            </form>
        </header>
        <div th:replace="~{fragments/admin-sidebar :: sidebar}"></div>
        <main class="main-content">
            <div class="container">
        <div th:if="${message}" class="alert alert-success">
            <span th:text="${message}"></span>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1>Sales</h1>
            <a th:href="@{/sales/new}" class="btn btn-primary">Add New Sale</a>
        </div>

        <div class="card mb-4">
            <div class="card-body">
                <form th:action="@{/admin/sales}" method="get" class="row g-3">
                    <div class="col-md-3">
                        <label class="form-label">Employee</label>
                        <select name="employeeId" class="form-select">
                            <option value="">All Employees</option>
                            <option th:each="emp : ${employees}" 
                                    th:value="${emp.id}" 
                                    th:text="${emp.fullName}"
                                    th:selected="${selectedEmployeeId == emp.id}"></option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Customer</label>
                        <select name="customerId" class="form-select">
                            <option value="">All Customers</option>
                            <option th:each="cust : ${customers}" 
                                    th:value="${cust.id}" 
                                    th:text="${cust.contactPerson}"
                                    th:selected="${selectedCustomerId == cust.id}"></option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Start Date</label>
                        <input type="date" name="startDate" class="form-control">
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">End Date</label>
                        <input type="date" name="endDate" class="form-control">
                    </div>
                    <div class="col-md-2 d-flex align-items-end">
                        <button type="submit" class="btn btn-primary me-2">Filter</button>
                        <a th:href="@{/admin/sales}" class="btn btn-secondary">Clear</a>
                    </div>
                </form>
            </div>
        </div>

        <div class="card">
            <div class="card-body">
                <table class="table" th:if="${sales != null and !sales.isEmpty()}">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Date</th>
                            <th>Customer</th>
                            <th>Product</th>
                            <th>Employee</th>
                            <th>Quantity</th>
                            <th>Unit Price</th>
                            <th>Total Amount</th>
                            <th>Status</th>
                            <th>View</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="sale : ${sales}">
                            <td th:text="${sale.id}"></td>
                            <td th:text="${#temporals.format(sale.saleDate, 'yyyy-MM-dd')}"></td>
                            <td th:text="${sale.customer.contactPerson}"></td>
                            <td th:text="${sale.productName}"></td>
                            <td th:text="${sale.employee.fullName}"></td>
                            <td th:text="${sale.quantity}"></td>
                            <td th:text="${'$' + #numbers.formatDecimal(sale.unitPrice, 0, 'COMMA', 2, 'POINT')}"></td>
                            <td th:text="${'$' + #numbers.formatDecimal(sale.totalAmount, 0, 'COMMA', 2, 'POINT')}"></td>
                            <td>
                                <span class="badge" 
                                      th:classappend="${sale.status == 'COMPLETED'} ? 'badge-success' : 
                                                      (${sale.status == 'PENDING'} ? 'badge-warning' : 'badge-danger')"
                                      th:text="${sale.status}">PENDING</span>
                            </td>
                            <td>
                                <a th:href="@{/admin/sales/view/{id}(id=${sale.id})}" class="btn btn-info btn-sm">
                                    <i class="fas fa-eye"></i> View Details
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
                <div class="empty-state" th:if="${sales == null or sales.isEmpty()}">
                    <p>No sales records found.</p>
                    <a th:href="@{/sales/new}" class="btn btn-primary mt-3">Add First Sale</a>
                </div>
            </div>
        </div>
    </div>

        </div>
            </div>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/sidebar.js}"></script>
</body>
</html>
