<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admins - Employee Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" th:href="@{/}">Employee Management</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" th:href="@{/}">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/admin/admins}">Admins</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/admin/employees}">Employees</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/admin/attendances}">Attendance</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/admin/customers}">Customers</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/admin/sales}">Sales</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        <div th:if="${success}" class="alert alert-success">
            <span th:text="${success}"></span>
        </div>
        <div th:if="${error}" class="alert alert-danger">
            <span th:text="${error}"></span>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1>Admin Management</h1>
            <a th:href="@{/admin/admins/new}" class="btn btn-primary">Add New Admin</a>
        </div>

        <div class="mb-3">
            <form th:action="@{/admin/admins}" method="get" class="d-flex gap-2">
                <select name="role" class="form-select" style="width: auto;">
                    <option value="">All Roles</option>
                    <option value="SUPER_ADMIN" th:selected="${selectedRole == 'SUPER_ADMIN'}">Super Admin</option>
                    <option value="ADMIN" th:selected="${selectedRole == 'ADMIN'}">Admin</option>
                    <option value="SUB_ADMIN" th:selected="${selectedRole == 'SUB_ADMIN'}">Sub Admin</option>
                </select>
                <button type="submit" class="btn btn-primary">Filter</button>
                <a th:href="@{/admin/admins}" class="btn btn-secondary">Clear</a>
            </form>
        </div>

        <div class="card">
            <div class="card-body">
                <table class="table" th:if="${admins != null and !admins.isEmpty()}">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Username</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Phone</th>
                            <th>Department</th>
                            <th>Role</th>
                            <th>Parent Admin</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="admin : ${admins}">
                            <td th:text="${admin.id}"></td>
                            <td><strong th:text="${admin.username}"></strong></td>
                            <td th:text="${admin.fullName}"></td>
                            <td th:text="${admin.email}"></td>
                            <td th:text="${admin.phone != null ? admin.phone : '-'}"></td>
                            <td th:text="${admin.department != null ? admin.department : '-'}"></td>
                            <td>
                                <span class="badge" 
                                      th:classappend="${admin.role == 'SUPER_ADMIN'} ? 'badge-danger' : (${admin.role == 'ADMIN'} ? 'badge-warning' : 'badge-info')"
                                      th:text="${admin.role}"></span>
                            </td>
                            <td th:text="${admin.parentAdmin != null ? admin.parentAdmin.fullName : '-'}">-</td>
                            <td>
                                <span class="badge" 
                                      th:classappend="${admin.status == 'ACTIVE'} ? 'badge-success' : 'badge-danger'"
                                      th:text="${admin.status}"></span>
                            </td>
                            <td>
                                <div class="action-buttons">
                                    <a th:href="@{/admin/admins/view/{id}(id=${admin.id})}" class="btn btn-info btn-sm">View</a>
                                    <a th:href="@{/admin/admins/edit/{id}(id=${admin.id})}" class="btn btn-warning btn-sm">Edit</a>
                                    <a th:href="@{/admin/admins/delete/{id}(id=${admin.id})}" 
                                       class="btn btn-danger btn-sm"
                                       onclick="return confirm('Are you sure you want to delete this admin?')">Delete</a>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
                <div class="empty-state" th:if="${admins == null or admins.isEmpty()}">
                    <p>No admins found.</p>
                    <a th:href="@{/admin/admins/new}" class="btn btn-primary mt-3">Add First Admin</a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
