<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance - Employee Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="dashboard-wrapper">
        <header class="top-header">
            <button class="mobile-menu-toggle" onclick="document.getElementById('sidebar').classList.toggle('mobile-open')">
                <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                </svg>
            </button>
            <div class="company-name">Potens Green</div>
            <form th:action="@{/logout}" method="post" style="display: inline;">
                <button type="submit" class="logout-btn">Logout</button>
            </form>
        </header>
        <div th:replace="~{fragments/admin-sidebar :: sidebar}"></div>
        <main class="main-content">
            <div class="container">
        <div th:if="${message}" class="alert alert-success">
            <span th:text="${message}"></span>
        </div>
        <div th:if="${error}" class="alert alert-danger">
            <span th:text="${error}"></span>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1>Attendance</h1>
            <a th:href="@{/attendances/new}" class="btn btn-primary">Add Attendance</a>
        </div>

        <div class="card mb-4">
            <div class="card-body">
                <form th:action="@{/attendances}" method="get" class="row g-3">
                    <div class="col-md-4">
                        <label class="form-label">Employee</label>
                        <select name="employeeId" class="form-select">
                            <option value="">All Employees</option>
                            <option th:each="emp : ${employees}" 
                                    th:value="${emp.id}" 
                                    th:text="${emp.fullName}"
                                    th:selected="${selectedEmployeeId == emp.id}"></option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Date</label>
                        <input type="date" name="date" class="form-control" th:value="${selectedDate != null ? #temporals.format(selectedDate, 'yyyy-MM-dd') : ''}">
                    </div>
                    <div class="col-md-4 d-flex align-items-end">
                        <button type="submit" class="btn btn-primary me-2">Filter</button>
                        <a th:href="@{/attendances}" class="btn btn-secondary">Clear</a>
                    </div>
                </form>
            </div>
        </div>

        <div class="card">
            <div class="card-body">
                <table class="table" th:if="${attendances != null and !attendances.isEmpty()}">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Employee</th>
                            <th>Check In</th>
                            <th>Check Out</th>
                            <th>Status</th>
                            <th>Working Hours</th>
                            <th>Notes</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="attendance : ${attendances}">
                            <td th:text="${#temporals.format(attendance.date, 'yyyy-MM-dd')}"></td>
                            <td th:text="${attendance.employee.fullName}"></td>
                            <td th:text="${attendance.checkIn != null ? #temporals.format(attendance.checkIn, 'HH:mm:ss') : '-'}"></td>
                            <td th:text="${attendance.checkOut != null ? #temporals.format(attendance.checkOut, 'HH:mm:ss') : '-'}"></td>
                            <td>
                                <span class="badge" 
                                      th:classappend="${attendance.status == 'PRESENT'} ? 'badge-success' : 
                                                      (${attendance.status == 'LATE'} ? 'badge-warning' : 
                                                       (${attendance.status == 'ABSENT'} ? 'badge-danger' : 'badge-info'))"
                                      th:text="${attendance.status}">PRESENT</span>
                            </td>
                            <td th:text="${attendance.workingHours != null ? attendance.workingHours + ' hrs' : '-'}"></td>
                            <td th:text="${attendance.notes != null ? attendance.notes : '-'}"></td>
                            <td>
                                <div class="action-buttons">
                                    <a th:href="@{/attendances/edit/{id}(id=${attendance.id})}" class="btn btn-warning btn-sm">Edit</a>
                                    <a th:href="@{/attendances/delete/{id}(id=${attendance.id})}" 
                                       class="btn btn-danger btn-sm"
                                       onclick="return confirm('Are you sure?')">Delete</a>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
                <div class="empty-state" th:if="${attendances == null or attendances.isEmpty()}">
                    <p>No attendance records found.</p>
                </div>
            </div>
        </div>
    </div>

        </div>
            </div>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/sidebar.js}"></script>
</body>
</html>
