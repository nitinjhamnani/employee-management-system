<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${attendance.id != null ? 'Edit Attendance' : 'Add Attendance'}">Attendance Form - Employee Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="dashboard-wrapper">
        <div th:replace="~{fragments/admin-header :: header}"></div>
        <div th:replace="~{fragments/admin-sidebar :: sidebar}"></div>
        <main class="main-content">
            <div class="container">
                <div th:if="${message}" class="alert alert-success mt-4" role="alert">
                    <span th:text="${message}"></span>
                </div>
                <div th:if="${error}" class="alert alert-danger mt-4" role="alert">
                    <span th:text="${error}"></span>
                </div>

                <div class="d-flex justify-content-between align-items-center mb-4 mt-4">
                    <h1 th:text="${attendance.id != null ? 'Edit Attendance' : 'Add Attendance'}">Add Attendance</h1>
                    <a th:href="@{/admin/attendances}" class="btn btn-secondary">Back to List</a>
                </div>

                <div class="card">
                    <div class="card-body">
                        <form th:action="@{/admin/attendances/save}" th:object="${attendance}" method="post">
                    <input type="hidden" th:field="*{id}">
                    
                    <div class="form-group mb-3">
                        <label class="form-label">Employee *</label>
                        <select class="form-select" name="employeeId" required>
                            <option value="">Select Employee</option>
                            <option th:each="emp : ${employees}" 
                                    th:value="${emp.id}" 
                                    th:text="${emp.fullName}"
                                    th:selected="${attendance != null and attendance.employee != null and attendance.employee.id == emp.id}"></option>
                        </select>
                        <span class="text-danger" th:if="${#fields.hasErrors('employee')}" th:errors="*{employee}"></span>
                    </div>

                    <div class="row">
                        <div class="col-md-4">
                            <div class="form-group">
                                <label class="form-label">Date *</label>
                                <input type="date" class="form-control" th:field="*{date}" required>
                                <span class="text-danger" th:if="${#fields.hasErrors('date')}" th:errors="*{date}"></span>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="form-group">
                                <label class="form-label">Check In</label>
                                <input type="datetime-local" class="form-control" th:field="*{checkIn}">
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="form-group">
                                <label class="form-label">Check Out</label>
                                <input type="datetime-local" class="form-control" th:field="*{checkOut}">
                            </div>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6">
                            <div class="form-group">
                                <label class="form-label">Status *</label>
                                <select class="form-select" th:field="*{status}" required>
                                    <option value="PRESENT">PRESENT</option>
                                    <option value="ABSENT">ABSENT</option>
                                    <option value="LATE">LATE</option>
                                    <option value="ON_LEAVE">ON_LEAVE</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="form-group mb-3">
                        <label class="form-label">Notes</label>
                        <textarea class="form-control" rows="3" th:field="*{notes}"></textarea>
                    </div>

                            <div class="mt-4">
                                <button type="submit" class="btn btn-primary">
                                    <i class="fas fa-save"></i> Save Attendance
                                </button>
                                <a th:href="@{/admin/attendances}" class="btn btn-secondary">Cancel</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/sidebar.js}"></script>
</body>
</html>
