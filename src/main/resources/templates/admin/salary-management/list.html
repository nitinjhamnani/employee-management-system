<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salary Management - Employee Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="dashboard-wrapper">
        <div th:replace="~{fragments/admin-header :: header}"></div>
        <div th:replace="~{fragments/admin-sidebar :: sidebar}"></div>
        <main class="main-content">
            <div class="container">
        <div th:if="${message}" class="alert alert-success">
            <span th:text="${message}"></span>
        </div>
        <div th:if="${error}" class="alert alert-danger">
            <span th:text="${error}"></span>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-4 mt-4">
            <h1><i class="fas fa-money-bill-wave"></i> Salary Management</h1>
            <div class="d-flex gap-2">
                <form th:action="@{/admin/salary-management/calculate-all-salaries}" method="post" style="display: inline;">
                    <button type="submit" class="btn btn-success">
                        <i class="fas fa-calculator"></i> Calculate All Salaries
                    </button>
                </form>
            </div>
        </div>

        <div class="card mb-4">
            <div class="card-body">
                <form th:action="@{/admin/salary-management}" method="get" class="row g-3">
                    <div class="col-md-4">
                        <label class="form-label">Filter by Hierarchy Level</label>
                        <select name="hierarchyLevel" class="form-select">
                            <option value="">All Levels</option>
                            <option value="PROMOTER" th:selected="${selectedHierarchyLevel == 'PROMOTER'}">Promoter</option>
                            <option value="ZONAL_HEAD" th:selected="${selectedHierarchyLevel == 'ZONAL_HEAD'}">Zonal Head</option>
                            <option value="CLUSTER_HEAD" th:selected="${selectedHierarchyLevel == 'CLUSTER_HEAD'}">Cluster Head</option>
                            <option value="AREA_SALES_MANAGER" th:selected="${selectedHierarchyLevel == 'AREA_SALES_MANAGER'}">Area Sales Manager</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Search by Name or ID</label>
                        <input type="text" name="search" class="form-control" th:value="${searchQuery}" placeholder="Search employees...">
                    </div>
                    <div class="col-md-4 d-flex align-items-end">
                        <button type="submit" class="btn btn-primary me-2">Filter</button>
                        <a th:href="@{/admin/salary-management}" class="btn btn-secondary">Clear</a>
                    </div>
                </form>
            </div>
        </div>

        <div class="card">
            <div class="card-header">Employee Salary Management</div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table" th:if="${employees != null and !employees.isEmpty()}">
                        <thead>
                            <tr>
                                <th>Employee ID</th>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Hierarchy Level</th>
                                <th>Base Salary</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="employee : ${employees}">
                                <td><strong th:text="${employee.username != null ? employee.username : 'N/A'}">N/A</strong></td>
                                <td th:text="${employee.fullName}">Name</td>
                                <td th:text="${employee.email}">Email</td>
                                <td>
                                    <span class="badge badge-info" th:text="${employee.hierarchyLevel}">Level</span>
                                </td>
                                <td>₹<span th:text="${employee.salary != null ? #numbers.formatDecimal(employee.salary, 0, 'COMMA', 2, 'POINT') : 'N/A'}">N/A</span></td>
                                <td>
                                    <span class="badge" th:classappend="${employee.status == 'ACTIVE'} ? 'badge-success' : 'badge-danger'"
                                          th:text="${employee.status}">ACTIVE</span>
                                </td>
                                <td>
                                    <div class="action-buttons">
                                        <a th:href="@{/admin/salary-management/employee/{id}(id=${employee.id})}" class="btn btn-info btn-sm">
                                            <i class="fas fa-eye"></i> Manage Salary
                                        </a>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <div th:if="${employees == null or employees.isEmpty()}" class="empty-state">
                    <p>No employees found.</p>
                </div>
            </div>
        </div>
            </div>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/sidebar.js}"></script>
</body>
</html>
