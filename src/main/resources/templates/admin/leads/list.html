<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leads - Employee Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="dashboard-wrapper">
        <div th:replace="~{fragments/admin-header :: header}"></div>
        <div th:replace="~{fragments/admin-sidebar :: sidebar}"></div>
        <main class="main-content">
            <div class="container">
        <div th:if="${message}" class="alert alert-success">
            <span th:text="${message}"></span>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1><i class="fas fa-user-friends"></i> Leads</h1>
        </div>

        <form th:action="@{/admin/leads}" method="get" class="search-form mb-3">
            <div class="row g-2">
                <div class="col-md-4">
                    <select name="status" class="form-select">
                        <option value="">All Status</option>
                        <option value="NEW" th:selected="${selectedStatus == 'NEW'}">New</option>
                        <option value="CONTACTED" th:selected="${selectedStatus == 'CONTACTED'}">Contacted</option>
                        <option value="QUALIFIED" th:selected="${selectedStatus == 'QUALIFIED'}">Qualified</option>
                        <option value="CONVERTED" th:selected="${selectedStatus == 'CONVERTED'}">Converted</option>
                        <option value="LOST" th:selected="${selectedStatus == 'LOST'}">Lost</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <select name="assignedTo" class="form-select">
                        <option value="">All Employees</option>
                        <option th:each="emp : ${employees}" 
                                th:value="${emp.id}" 
                                th:text="${emp.fullName}"
                                th:selected="${selectedAssignedTo != null and selectedAssignedTo == emp.id}"></option>
                    </select>
                </div>
                <div class="col-md-4">
                    <button type="submit" class="btn btn-primary">Filter</button>
                    <a th:href="@{/admin/leads}" class="btn btn-secondary">Clear</a>
                </div>
            </div>
        </form>

        <div class="card">
            <div class="card-body">
                <table class="table" th:if="${leads != null and !leads.isEmpty()}">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Mobile</th>
                            <th>District</th>
                            <th>Interested In</th>
                            <th>Status</th>
                            <th>Assigned To</th>
                            <th>Created At</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="lead : ${leads}">
                            <td th:text="${lead.id}"></td>
                            <td th:text="${lead.name}"></td>
                            <td th:text="${lead.mobile}"></td>
                            <td th:text="${lead.district}"></td>
                            <td th:text="${lead.interestedIn}"></td>
                            <td>
                                <span class="badge" 
                                      th:classappend="${lead.status == 'NEW'} ? 'badge-info' : 
                                                      (${lead.status == 'CONTACTED'} ? 'badge-primary' :
                                                      (${lead.status == 'QUALIFIED'} ? 'badge-warning' :
                                                      (${lead.status == 'CONVERTED'} ? 'badge-success' : 'badge-danger')))"
                                      th:text="${lead.status}">NEW</span>
                            </td>
                            <td>
                                <span th:if="${lead.assignedTo != null}" th:text="${lead.assignedTo.fullName}">-</span>
                                <span th:if="${lead.assignedTo == null}" class="text-muted">Unassigned</span>
                            </td>
                            <td th:text="${#temporals.format(lead.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
                            <td>
                                <a th:href="@{/admin/leads/view/{id}(id=${lead.id})}" class="btn btn-info btn-sm">
                                    <i class="fas fa-eye"></i> View
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
                <div class="empty-state" th:if="${leads == null or leads.isEmpty()}">
                    <p>No leads found.</p>
                </div>
            </div>
        </div>
            </div>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/sidebar.js}"></script>
</body>
</html>
