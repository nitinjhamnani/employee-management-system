<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Details - Employee Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" th:href="@{/}">Employee Management</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" th:href="@{/}">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/employees}">Employees</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/attendances}">Attendance</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/customers}">Customers</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/sales}">Sales</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1>Customer Details</h1>
            <div>
                <a th:href="@{/customers/edit/{id}(id=${customer.id})}" class="btn btn-warning">Edit</a>
                <a th:href="@{/customers}" class="btn btn-secondary">Back to List</a>
            </div>
        </div>

        <div class="card">
            <div class="card-body">
                <div class="row">
                    <div class="col-md-6">
                        <h5>Contact Information</h5>
                        <table class="table">
                            <tr>
                                <th>Contact Person:</th>
                                <td th:text="${customer.contactPerson}"></td>
                            </tr>
                            <tr>
                                <th>Email:</th>
                                <td th:text="${customer.email}"></td>
                            </tr>
                            <tr>
                                <th>Phone:</th>
                                <td th:text="${customer.phone}"></td>
                            </tr>
                            <tr>
                                <th>Status:</th>
                                <td>
                                    <span class="badge" 
                                          th:classappend="${customer.status == 'ACTIVE'} ? 'badge-success' : 
                                                          (${customer.status == 'POTENTIAL'} ? 'badge-info' : 'badge-danger')"
                                          th:text="${customer.status}">ACTIVE</span>
                                </td>
                            </tr>
                        </table>
                    </div>
                    <div class="col-md-6">
                        <h5>Address Information</h5>
                        <table class="table">
                            <tr>
                                <th>Address:</th>
                                <td th:text="${customer.address != null ? customer.address : '-'}"></td>
                            </tr>
                            <tr>
                                <th>Area:</th>
                                <td th:text="${customer.area != null ? customer.area : '-'}"></td>
                            </tr>
                            <tr>
                                <th>City:</th>
                                <td th:text="${customer.city != null ? customer.city : '-'}"></td>
                            </tr>
                            <tr>
                                <th>State:</th>
                                <td th:text="${customer.state != null ? customer.state : '-'}"></td>
                            </tr>
                            <tr>
                                <th>Zip Code:</th>
                                <td th:text="${customer.zipCode != null ? customer.zipCode : '-'}"></td>
                            </tr>
                            <tr>
                                <th>Country:</th>
                                <td th:text="${customer.country != null ? customer.country : '-'}"></td>
                            </tr>
                        </table>
                    </div>
                </div>
                <div class="mt-4" th:if="${customer.notes != null and !customer.notes.isEmpty()}">
                    <h5>Notes</h5>
                    <p th:text="${customer.notes}"></p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
