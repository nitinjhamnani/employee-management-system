<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${employeeTypeLabel + 's'}">Employees - Employee Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="dashboard-wrapper">
        <header class="top-header">
            <div class="header-left">
                <button class="mobile-menu-toggle" onclick="toggleMobileSidebar()" title="Toggle Sidebar">
                    <i class="fas fa-bars"></i>
                </button>
                <button class="sidebar-expand-toggle" onclick="toggleSidebar()" title="Expand/Collapse Sidebar">
                    <i class="fas fa-bars"></i>
                </button>
            </div>
            <div class="company-name">Potens Green</div>
            <form th:action="@{/logout}" method="post" style="display: inline;">
                <button type="submit" class="logout-btn">Logout</button>
            </form>
        </header>

        <div th:replace="~{fragments/admin-sidebar :: sidebar}"></div>

        <main class="main-content">
            <div class="container">
        <div th:if="${message}" class="alert alert-success">
            <span th:text="${message}"></span>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 th:text="${employeeTypeLabel + 's'}">Employees</h1>
            <a th:href="${listUrl + '/new'}" class="btn btn-primary" th:text="${'Add New ' + employeeTypeLabel}">Add New</a>
        </div>

        <form th:action="${listUrl}" method="get" class="search-form mb-3">
            <input type="text" name="search" class="form-control" placeholder="Search..." th:value="${search}">
            <button type="submit" class="btn btn-primary">Search</button>
            <a th:href="${listUrl}" class="btn btn-secondary">Clear</a>
        </form>

        <div class="card">
            <div class="card-body">
                <table class="table" th:if="${employees != null and !employees.isEmpty()}">
                    <thead>
                        <tr>
                            <th>Employee ID</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Phone</th>
                            <th>Location</th>
                            <th>Reporting Manager</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="employee : ${employees}">
                            <td>
                                <strong th:text="${employee.username != null ? employee.username : 'N/A'}">N/A</strong>
                            </td>
                            <td th:text="${employee.fullName}"></td>
                            <td th:text="${employee.email}"></td>
                            <td th:text="${employee.phone}"></td>
                            <td>
                                <small th:text="${employee.city + ', ' + employee.state}">City, State</small><br>
                                <small class="text-muted" th:text="${employee.area}">Area</small>
                            </td>
                            <td th:text="${employee.reportingManager != null ? employee.reportingManager.fullName : '-'}">-</td>
                            <td>
                                <span class="badge" 
                                      th:classappend="${employee.status == 'ACTIVE'} ? 'badge-success' : 'badge-danger'"
                                      th:text="${employee.status}">ACTIVE</span>
                            </td>
                            <td>
                                <div class="action-buttons">
                                    <a th:href="${baseUrl + '/view/' + employee.id}" class="btn btn-info btn-sm">View</a>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
                <div class="empty-state" th:if="${employees == null or employees.isEmpty()}">
                    <p th:text="${'No ' + employeeTypeLabel + 's found.'}">No employees found.</p>
                    <a th:href="${listUrl + '/new'}" class="btn btn-primary mt-3" th:text="${'Add First ' + employeeTypeLabel}">Add First</a>
                </div>
            </div>
        </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/sidebar.js}"></script>
</body>
</html>
