<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transactions - Employee Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="dashboard-wrapper">
        <header class="top-header">
            <div class="header-left">
                <button class="mobile-menu-toggle" onclick="toggleMobileSidebar()" title="Toggle Sidebar">
                    <i class="fas fa-bars"></i>
                </button>
                <button class="sidebar-expand-toggle" onclick="toggleSidebar()" title="Expand/Collapse Sidebar">
                    <i class="fas fa-bars"></i>
                </button>
            </div>
            <div class="company-name">Potens Green</div>
            <form th:action="@{/logout}" method="post" style="display: inline;">
                <button type="submit" class="logout-btn">Logout</button>
            </form>
        </header>
        <div th:replace="~{fragments/admin-sidebar :: sidebar}"></div>
        <main class="main-content">
            <div class="container">
        <div th:if="${message}" class="alert alert-success">
            <span th:text="${message}"></span>
        </div>
        <div th:if="${error}" class="alert alert-danger">
            <span th:text="${error}"></span>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1><i class="fas fa-receipt"></i> Transactions</h1>
        </div>

        <form th:action="@{/admin/transactions}" method="get" class="search-form mb-3">
            <div class="row g-2">
                <div class="col-md-4">
                    <input type="text" name="search" class="form-control" placeholder="Search by customer, product..." th:value="${search}">
                </div>
                <div class="col-md-4">
                    <input type="text" name="invoiceNumber" class="form-control" placeholder="Search by invoice number..." th:value="${invoiceNumber}">
                </div>
                <div class="col-md-4">
                    <button type="submit" class="btn btn-primary">Search</button>
                    <a th:href="@{/admin/transactions}" class="btn btn-secondary">Clear</a>
                </div>
            </div>
        </form>

        <div class="card">
            <div class="card-body">
                <table class="table" th:if="${transactions != null and !transactions.isEmpty()}">
                    <thead>
                        <tr>
                            <th>Invoice #</th>
                            <th>Date</th>
                            <th>Customer</th>
                            <th>Product</th>
                            <th>Employee</th>
                            <th>Amount</th>
                            <th>Transaction Mode</th>
                            <th>Settlement Status</th>
                            <th>Approval Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="transaction : ${transactions}">
                            <td>
                                <strong th:text="${transaction.invoiceNumber != null ? transaction.invoiceNumber : 'N/A'}">INV-000001</strong>
                            </td>
                            <td th:text="${#temporals.format(transaction.paymentDate, 'yyyy-MM-dd HH:mm')}">2026-01-23</td>
                            <td th:text="${transaction.sale != null and transaction.sale.customer != null ? transaction.sale.customer.contactPerson : '-'}">Customer</td>
                            <td>
                                <span th:if="${transaction.sale != null}">
                                    <span th:if="${transaction.sale.productName != null}" th:text="${transaction.sale.productName}">Product Name</span>
                                    <span th:unless="${transaction.sale.productName != null}" th:if="${transaction.sale.product != null}" th:text="${transaction.sale.product.name}">Product</span>
                                    <span th:unless="${transaction.sale.productName != null and transaction.sale.product != null}">-</span>
                                </span>
                                <span th:if="${transaction.sale == null}">-</span>
                            </td>
                            <td th:text="${transaction.sale != null and transaction.sale.employee != null ? transaction.sale.employee.fullName : '-'}">Employee</td>
                            <td><strong>₹<span th:text="${#numbers.formatDecimal(transaction.amount, 0, 'COMMA', 2, 'POINT')}">0.00</span></strong></td>
                            <td>
                                <span class="badge"
                                      th:classappend="${transaction.transactionMode == 'CASH'} ? 'badge-success' :
                                                      (${transaction.transactionMode == 'UPI'} ? 'badge-info' : 'badge-primary')"
                                      th:text="${transaction.transactionMode}">CASH</span>
                            </td>
                            <td>
                                <span class="badge"
                                      th:classappend="${transaction.settled == true} ? 'badge-success' : 'badge-warning'"
                                      th:text="${transaction.settled == true ? 'Settled' : 'Not Settled'}">Not Settled</span>
                            </td>
                            <td>
                                <span class="badge"
                                      th:classappend="${transaction.approved == true} ? 'badge-success' :
                                                      (${transaction.settled == true} ? 'badge-info' : 'badge-secondary')"
                                      th:text="${transaction.approved == true ? 'Approved' : (transaction.settled == true ? 'Pending Approval' : 'Not Settled')}">Not Settled</span>
                            </td>
                            <td>
                                <div class="action-buttons">
                                    <a th:href="@{/admin/transactions/view/{id}(id=${transaction.id})}" class="btn btn-info btn-sm">View</a>
                                    <a th:href="@{/admin/transactions/invoice/{id}(id=${transaction.id})}" class="btn btn-success btn-sm" target="_blank">
                                        <i class="fas fa-file-invoice"></i> Invoice
                                    </a>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
                <div class="empty-state" th:if="${transactions == null or transactions.isEmpty()}">
                    <p>No transactions found.</p>
                </div>
            </div>
        </div>
            </div>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/sidebar.js}"></script>
</body>
</html>
