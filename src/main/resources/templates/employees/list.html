<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employees - Employee Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" th:href="@{/}">Employee Management</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" th:href="@{/}">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/employees}">Employees</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/attendances}">Attendance</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/customers}">Customers</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/sales}">Sales</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        <div th:if="${message}" class="alert alert-success">
            <span th:text="${message}"></span>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1>Employees</h1>
            <a th:href="@{/employees/new}" class="btn btn-primary">Add New Employee</a>
        </div>

        <form th:action="@{/employees}" method="get" class="search-form">
            <input type="text" name="search" class="form-control" placeholder="Search employees..." th:value="${search}">
            <button type="submit" class="btn btn-primary">Search</button>
            <a th:href="@{/employees}" class="btn btn-secondary">Clear</a>
        </form>

        <div class="card">
            <div class="card-body">
                <table class="table" th:if="${employees != null and !employees.isEmpty()}">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Phone</th>
                            <th>Department</th>
                            <th>Position</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="employee : ${employees}">
                            <td th:text="${employee.id}"></td>
                            <td th:text="${employee.fullName}"></td>
                            <td th:text="${employee.email}"></td>
                            <td th:text="${employee.phone}"></td>
                            <td th:text="${employee.department}"></td>
                            <td th:text="${employee.position}"></td>
                            <td>
                                <span class="badge" 
                                      th:classappend="${employee.status == 'ACTIVE'} ? 'badge-success' : 'badge-danger'"
                                      th:text="${employee.status}">ACTIVE</span>
                            </td>
                            <td>
                                <div class="action-buttons">
                                    <a th:href="@{/employees/view/{id}(id=${employee.id})}" class="btn btn-info btn-sm">View</a>
                                    <a th:href="@{/employees/edit/{id}(id=${employee.id})}" class="btn btn-warning btn-sm">Edit</a>
                                    <a th:href="@{/employees/delete/{id}(id=${employee.id})}" 
                                       class="btn btn-danger btn-sm"
                                       onclick="return confirm('Are you sure you want to delete this employee?')">Delete</a>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
                <div class="empty-state" th:if="${employees == null or employees.isEmpty()}">
                    <p>No employees found.</p>
                    <a th:href="@{/employees/new}" class="btn btn-primary mt-3">Add First Employee</a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
