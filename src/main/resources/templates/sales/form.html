<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${sale.id != null ? 'Edit Sale' : 'Add Sale'}">Sale Form - Employee Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" th:href="@{/}">Employee Management</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" th:href="@{/}">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/employees}">Employees</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/attendances}">Attendance</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/customers}">Customers</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/sales}">Sales</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        <h1 class="mb-4" th:text="${sale.id != null ? 'Edit Sale' : 'Add New Sale'}">Add Sale</h1>

        <div class="card">
            <div class="card-body">
                <form th:action="@{/sales/save}" th:object="${sale}" method="post">
                    <input type="hidden" th:field="*{id}">
                    
                    <div class="row">
                        <div class="col-md-6">
                            <div class="form-group">
                                <label class="form-label">Employee *</label>
                                <select class="form-select" name="employeeId" required>
                                    <option value="">Select Employee</option>
                                    <option th:each="emp : ${employees}" 
                                            th:value="${emp.id}" 
                                            th:text="${emp.fullName}"
                                            th:selected="${sale != null and sale.employee != null and sale.employee.id == emp.id}"></option>
                                </select>
                                <span class="text-danger" th:if="${#fields.hasErrors('employee')}" th:errors="*{employee}"></span>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <label class="form-label">Customer *</label>
                                <select class="form-select" name="customerId" required>
                                    <option value="">Select Customer</option>
                                    <option th:each="cust : ${customers}" 
                                            th:value="${cust.id}" 
                                            th:text="${cust.companyName}"
                                            th:selected="${sale != null and sale.customer != null and sale.customer.id == cust.id}"></option>
                                </select>
                                <span class="text-danger" th:if="${#fields.hasErrors('customer')}" th:errors="*{customer}"></span>
                            </div>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6">
                            <div class="form-group">
                                <label class="form-label">Sale Date *</label>
                                <input type="date" class="form-control" th:field="*{saleDate}" required>
                                <span class="text-danger" th:if="${#fields.hasErrors('saleDate')}" th:errors="*{saleDate}"></span>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <label class="form-label">Status *</label>
                                <select class="form-select" th:field="*{status}" required>
                                    <option value="PENDING">PENDING</option>
                                    <option value="COMPLETED">COMPLETED</option>
                                    <option value="CANCELLED">CANCELLED</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Product/Service Name *</label>
                        <input type="text" class="form-control" th:field="*{productName}" required>
                        <span class="text-danger" th:if="${#fields.hasErrors('productName')}" th:errors="*{productName}"></span>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Description</label>
                        <textarea class="form-control" rows="3" th:field="*{description}"></textarea>
                    </div>

                    <div class="row">
                        <div class="col-md-4">
                            <div class="form-group">
                                <label class="form-label">Quantity *</label>
                                <input type="number" class="form-control" th:field="*{quantity}" min="1" required onchange="calculateTotal()">
                                <span class="text-danger" th:if="${#fields.hasErrors('quantity')}" th:errors="*{quantity}"></span>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="form-group">
                                <label class="form-label">Unit Price *</label>
                                <input type="number" step="0.01" class="form-control" id="unitPrice" th:field="*{unitPrice}" min="0.01" required onchange="calculateTotal()">
                                <span class="text-danger" th:if="${#fields.hasErrors('unitPrice')}" th:errors="*{unitPrice}"></span>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="form-group">
                                <label class="form-label">Total Amount *</label>
                                <input type="number" step="0.01" class="form-control" id="totalAmount" th:field="*{totalAmount}" readonly>
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Notes</label>
                        <textarea class="form-control" rows="2" th:field="*{notes}"></textarea>
                    </div>

                    <div class="mt-4">
                        <button type="submit" class="btn btn-primary">Save Sale</button>
                        <a th:href="@{/sales}" class="btn btn-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function calculateTotal() {
            const quantity = parseFloat(document.querySelector('[name="quantity"]').value) || 0;
            const unitPrice = parseFloat(document.getElementById('unitPrice').value) || 0;
            const totalAmount = quantity * unitPrice;
            document.getElementById('totalAmount').value = totalAmount.toFixed(2);
        }
    </script>
</body>
</html>
