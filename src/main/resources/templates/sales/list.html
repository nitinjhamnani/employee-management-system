<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales - Employee Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" th:href="@{/}">Employee Management</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" th:href="@{/}">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/employees}">Employees</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/attendances}">Attendance</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/customers}">Customers</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/sales}">Sales</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        <div th:if="${message}" class="alert alert-success">
            <span th:text="${message}"></span>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1>Sales</h1>
            <a th:href="@{/sales/new}" class="btn btn-primary">Add New Sale</a>
        </div>

        <div class="card mb-4">
            <div class="card-body">
                <form th:action="@{/sales}" method="get" class="row g-3">
                    <div class="col-md-3">
                        <label class="form-label">Employee</label>
                        <select name="employeeId" class="form-select">
                            <option value="">All Employees</option>
                            <option th:each="emp : ${employees}" 
                                    th:value="${emp.id}" 
                                    th:text="${emp.fullName}"
                                    th:selected="${selectedEmployeeId == emp.id}"></option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Customer</label>
                        <select name="customerId" class="form-select">
                            <option value="">All Customers</option>
                            <option th:each="cust : ${customers}" 
                                    th:value="${cust.id}" 
                                    th:text="${cust.companyName}"
                                    th:selected="${selectedCustomerId == cust.id}"></option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Start Date</label>
                        <input type="date" name="startDate" class="form-control">
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">End Date</label>
                        <input type="date" name="endDate" class="form-control">
                    </div>
                    <div class="col-md-2 d-flex align-items-end">
                        <button type="submit" class="btn btn-primary me-2">Filter</button>
                        <a th:href="@{/sales}" class="btn btn-secondary">Clear</a>
                    </div>
                </form>
            </div>
        </div>

        <div class="card">
            <div class="card-body">
                <table class="table" th:if="${sales != null and !sales.isEmpty()}">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Date</th>
                            <th>Customer</th>
                            <th>Product</th>
                            <th>Employee</th>
                            <th>Quantity</th>
                            <th>Unit Price</th>
                            <th>Total Amount</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="sale : ${sales}">
                            <td th:text="${sale.id}"></td>
                            <td th:text="${#temporals.format(sale.saleDate, 'yyyy-MM-dd')}"></td>
                            <td th:text="${sale.customer.companyName}"></td>
                            <td th:text="${sale.productName}"></td>
                            <td th:text="${sale.employee.fullName}"></td>
                            <td th:text="${sale.quantity}"></td>
                            <td th:text="${'$' + #numbers.formatDecimal(sale.unitPrice, 0, 'COMMA', 2, 'POINT')}"></td>
                            <td th:text="${'$' + #numbers.formatDecimal(sale.totalAmount, 0, 'COMMA', 2, 'POINT')}"></td>
                            <td>
                                <span class="badge" 
                                      th:classappend="${sale.status == 'COMPLETED'} ? 'badge-success' : 
                                                      (${sale.status == 'PENDING'} ? 'badge-warning' : 'badge-danger')"
                                      th:text="${sale.status}">PENDING</span>
                            </td>
                            <td>
                                <div class="action-buttons">
                                    <a th:href="@{/sales/view/{id}(id=${sale.id})}" class="btn btn-info btn-sm">View</a>
                                    <a th:href="@{/sales/edit/{id}(id=${sale.id})}" class="btn btn-warning btn-sm">Edit</a>
                                    <a th:href="@{/sales/delete/{id}(id=${sale.id})}" 
                                       class="btn btn-danger btn-sm"
                                       onclick="return confirm('Are you sure?')">Delete</a>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
                <div class="empty-state" th:if="${sales == null or sales.isEmpty()}">
                    <p>No sales records found.</p>
                    <a th:href="@{/sales/new}" class="btn btn-primary mt-3">Add First Sale</a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
