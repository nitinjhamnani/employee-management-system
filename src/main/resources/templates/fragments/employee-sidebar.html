<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="sidebar">
    <aside class="sidebar" id="sidebar">
        <ul class="sidebar-menu">
            <li class="sidebar-menu-item">
                <a class="sidebar-menu-link" th:href="@{/employee/dashboard}" th:classappend="${#httpServletRequest != null and #strings.contains(#httpServletRequest.requestURI, '/employee/dashboard')} ? 'active'">
                    <span class="sidebar-menu-icon"><i class="fas fa-chart-line"></i></span>
                    <span class="sidebar-menu-text">Dashboard</span>
                </a>
            </li>
            
            <li class="sidebar-menu-group">
                <div class="sidebar-menu-group-title">Work</div>
            </li>
            
            <li class="sidebar-menu-item">
                <a class="sidebar-menu-link" th:href="@{/employee/sales-target}" th:classappend="${#httpServletRequest != null and #strings.contains(#httpServletRequest.requestURI, '/employee/sales-target')} ? 'active'">
                    <span class="sidebar-menu-icon"><i class="fas fa-bullseye"></i></span>
                    <span class="sidebar-menu-text">My Sales Target</span>
                </a>
            </li>
            <li class="sidebar-menu-item" th:if="${currentEmployee != null and currentEmployee.hierarchyLevel != 'AREA_SALES_MANAGER'}">
                <a class="sidebar-menu-link" th:href="@{/employee/sales-targets}" th:classappend="${#httpServletRequest != null and #strings.contains(#httpServletRequest.requestURI, '/employee/sales-targets')} ? 'active'">
                    <span class="sidebar-menu-icon"><i class="fas fa-tasks"></i></span>
                    <span class="sidebar-menu-text">Manage Team Targets</span>
                </a>
            </li>
            <li class="sidebar-menu-item">
                <a class="sidebar-menu-link" th:href="@{/employee/customers}" th:classappend="${#httpServletRequest != null and #strings.contains(#httpServletRequest.requestURI, '/employee/customers')} ? 'active'">
                    <span class="sidebar-menu-icon"><i class="fas fa-users"></i></span>
                    <span class="sidebar-menu-text">Customers</span>
                </a>
            </li>
            <li class="sidebar-menu-item">
                <a class="sidebar-menu-link" th:href="@{/employee/sales}" th:classappend="${#httpServletRequest != null and #strings.contains(#httpServletRequest.requestURI, '/employee/sales')} ? 'active'">
                    <span class="sidebar-menu-icon"><i class="fas fa-shopping-cart"></i></span>
                    <span class="sidebar-menu-text">Sales</span>
                </a>
            </li>
            <li class="sidebar-menu-item">
                <a class="sidebar-menu-link" th:href="@{/employee/transactions}" th:classappend="${#httpServletRequest != null and #strings.contains(#httpServletRequest.requestURI, '/employee/transactions')} ? 'active'">
                    <span class="sidebar-menu-icon"><i class="fas fa-receipt"></i></span>
                    <span class="sidebar-menu-text">Transactions</span>
                </a>
            </li>

            <li th:if="${manageableEmployeeTypes != null and !manageableEmployeeTypes.isEmpty()}" class="sidebar-menu-group">
                <div class="sidebar-menu-group-title">Management</div>
            </li>
            <li th:if="${manageableEmployeeTypes != null and !manageableEmployeeTypes.isEmpty()}" class="sidebar-menu-item sidebar-menu-parent" th:classappend="${#httpServletRequest != null and #strings.contains(#httpServletRequest.requestURI, '/employee/team/')} ? 'expanded'">
                <a class="sidebar-menu-link sidebar-menu-toggle" href="javascript:void(0);" onclick="toggleEmployeeSubmenu(event)">
                    <span class="sidebar-menu-icon"><i class="fas fa-user-tie"></i></span>
                    <span class="sidebar-menu-text">Employee Management</span>
                    <span class="sidebar-menu-chevron"><i class="fas fa-chevron-down"></i></span>
                </a>
                <ul class="sidebar-submenu">
                    <li th:each="menuType : ${manageableEmployeeTypes}" class="sidebar-submenu-item" th:with="label=${manageableEmployeeTypeLabels != null ? manageableEmployeeTypeLabels.get(menuType) : menuType}">
                        <a class="sidebar-submenu-link" th:href="@{/employee/team/{t}(t=${menuType})}" th:classappend="${#httpServletRequest != null and #strings.contains(#httpServletRequest.requestURI, '/employee/team/' + menuType)} ? 'active'">
                            <span class="sidebar-submenu-icon"><i th:class="${'fas ' + (menuType == 'zonal-heads' ? 'fa-user-tag' : (menuType == 'cluster-heads' ? 'fa-users' : 'fa-user-cog'))}"></i></span>
                            <span class="sidebar-submenu-text" th:text="${label}">Label</span>
                        </a>
                    </li>
                </ul>
            </li>
            
            <li class="sidebar-menu-group">
                <div class="sidebar-menu-group-title">Requests</div>
            </li>
            
            <li class="sidebar-menu-item">
                <a class="sidebar-menu-link" th:href="@{/employee/claims}" th:classappend="${#httpServletRequest != null and #strings.contains(#httpServletRequest.requestURI, '/employee/claims') and !#strings.contains(#httpServletRequest.requestURI, '/pending-approvals')} ? 'active'">
                    <span class="sidebar-menu-icon"><i class="fas fa-receipt"></i></span>
                    <span class="sidebar-menu-text">Claims</span>
                </a>
            </li>
            <li class="sidebar-menu-item" th:if="${manageableEmployeeTypes != null and !manageableEmployeeTypes.isEmpty()}">
                <a class="sidebar-menu-link" th:href="@{/employee/claims/pending-approvals}" th:classappend="${#httpServletRequest != null and #strings.contains(#httpServletRequest.requestURI, '/employee/claims/pending-approvals')} ? 'active'">
                    <span class="sidebar-menu-icon"><i class="fas fa-clipboard-check"></i></span>
                    <span class="sidebar-menu-text">Pending Claim Approvals</span>
                </a>
            </li>
            <li class="sidebar-menu-item">
                <a class="sidebar-menu-link" th:href="@{/employee/leave-requests}" th:classappend="${#httpServletRequest != null and #strings.contains(#httpServletRequest.requestURI, '/employee/leave-requests') and !#strings.contains(#httpServletRequest.requestURI, '/pending-approvals')} ? 'active'">
                    <span class="sidebar-menu-icon"><i class="fas fa-calendar-times"></i></span>
                    <span class="sidebar-menu-text">Leave Requests</span>
                </a>
            </li>
            <li class="sidebar-menu-item" th:if="${manageableEmployeeTypes != null and !manageableEmployeeTypes.isEmpty()}">
                <a class="sidebar-menu-link" th:href="@{/employee/leave-requests/pending-approvals}" th:classappend="${#httpServletRequest != null and #strings.contains(#httpServletRequest.requestURI, '/employee/leave-requests/pending-approvals')} ? 'active'">
                    <span class="sidebar-menu-icon"><i class="fas fa-clipboard-check"></i></span>
                    <span class="sidebar-menu-text">Pending Leave Approvals</span>
                </a>
            </li>
            
            <li class="sidebar-menu-group">
                <div class="sidebar-menu-group-title">Personal</div>
            </li>
            
            <li class="sidebar-menu-item">
                <a class="sidebar-menu-link" th:href="@{/employee/bank-details}" th:classappend="${#httpServletRequest != null and #strings.contains(#httpServletRequest.requestURI, '/employee/bank-details')} ? 'active'">
                    <span class="sidebar-menu-icon"><i class="fas fa-credit-card"></i></span>
                    <span class="sidebar-menu-text">Bank Details</span>
                </a>
            </li>
            <li class="sidebar-menu-item">
                <a class="sidebar-menu-link" th:href="@{/employee/salary}" th:classappend="${#httpServletRequest != null and #strings.contains(#httpServletRequest.requestURI, '/employee/salary')} ? 'active'">
                    <span class="sidebar-menu-icon"><i class="fas fa-wallet"></i></span>
                    <span class="sidebar-menu-text">Salary</span>
                </a>
            </li>
        </ul>
    </aside>
</html>
