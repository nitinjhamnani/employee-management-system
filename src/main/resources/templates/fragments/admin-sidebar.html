<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="sidebar">
    <aside class="sidebar" id="sidebar">
        <ul class="sidebar-menu">
            <li class="sidebar-menu-item">
                <a class="sidebar-menu-link" th:href="@{/admin}" th:classappend="${#httpServletRequest != null and #httpServletRequest.requestURI == '/admin'} ? 'active'">
                    <span class="sidebar-menu-icon"><i class="fas fa-chart-line"></i></span>
                    <span class="sidebar-menu-text">Dashboard</span>
                </a>
            </li>
            
            <li class="sidebar-menu-group">
                <div class="sidebar-menu-group-title">Management</div>
            </li>
            
            <li class="sidebar-menu-item">
                <a class="sidebar-menu-link" th:href="@{/admin/admins}" th:classappend="${#httpServletRequest != null and #strings.contains(#httpServletRequest.requestURI, '/admin/admins')} ? 'active'">
                    <span class="sidebar-menu-icon"><i class="fas fa-users-cog"></i></span>
                    <span class="sidebar-menu-text">Admins</span>
                </a>
            </li>
            <li class="sidebar-menu-item sidebar-menu-parent" th:classappend="${#httpServletRequest != null and #strings.contains(#httpServletRequest.requestURI, '/admin/employees/')} ? 'expanded'">
                <a class="sidebar-menu-link sidebar-menu-toggle" href="javascript:void(0);" onclick="toggleEmployeeSubmenu(event)">
                    <span class="sidebar-menu-icon"><i class="fas fa-user-tie"></i></span>
                    <span class="sidebar-menu-text">Employee Management</span>
                    <span class="sidebar-menu-chevron"><i class="fas fa-chevron-down"></i></span>
                </a>
                <ul class="sidebar-submenu">
                    <li class="sidebar-submenu-item">
                        <a class="sidebar-submenu-link" th:href="@{/admin/employees/promoters}" th:classappend="${#httpServletRequest != null and #strings.contains(#httpServletRequest.requestURI, '/admin/employees/promoters')} ? 'active'">
                            <span class="sidebar-submenu-icon"><i class="fas fa-user"></i></span>
                            <span class="sidebar-submenu-text">Promoter</span>
                        </a>
                    </li>
                    <li class="sidebar-submenu-item">
                        <a class="sidebar-submenu-link" th:href="@{/admin/employees/zonal-heads}" th:classappend="${#httpServletRequest != null and #strings.contains(#httpServletRequest.requestURI, '/admin/employees/zonal-heads')} ? 'active'">
                            <span class="sidebar-submenu-icon"><i class="fas fa-user-tag"></i></span>
                            <span class="sidebar-submenu-text">Zonal Head</span>
                        </a>
                    </li>
                    <li class="sidebar-submenu-item">
                        <a class="sidebar-submenu-link" th:href="@{/admin/employees/cluster-heads}" th:classappend="${#httpServletRequest != null and #strings.contains(#httpServletRequest.requestURI, '/admin/employees/cluster-heads')} ? 'active'">
                            <span class="sidebar-submenu-icon"><i class="fas fa-users"></i></span>
                            <span class="sidebar-submenu-text">Cluster Head</span>
                        </a>
                    </li>
                    <li class="sidebar-submenu-item">
                        <a class="sidebar-submenu-link" th:href="@{/admin/employees/area-sales-managers}" th:classappend="${#httpServletRequest != null and #strings.contains(#httpServletRequest.requestURI, '/admin/employees/area-sales-managers')} ? 'active'">
                            <span class="sidebar-submenu-icon"><i class="fas fa-user-cog"></i></span>
                            <span class="sidebar-submenu-text">Area Sales Manager</span>
                        </a>
                    </li>
                </ul>
            </li>
            <li class="sidebar-menu-item">
                <a class="sidebar-menu-link" th:href="@{/admin/attendances}" th:classappend="${#httpServletRequest != null and #strings.contains(#httpServletRequest.requestURI, '/admin/attendances')} ? 'active'">
                    <span class="sidebar-menu-icon"><i class="fas fa-calendar-check"></i></span>
                    <span class="sidebar-menu-text">Attendance</span>
                </a>
            </li>
            
            <li class="sidebar-menu-group">
                <div class="sidebar-menu-group-title">Business</div>
            </li>
            
            <li class="sidebar-menu-item">
                <a class="sidebar-menu-link" th:href="@{/admin/customers}" th:classappend="${#httpServletRequest != null and #strings.contains(#httpServletRequest.requestURI, '/admin/customers')} ? 'active'">
                    <span class="sidebar-menu-icon"><i class="fas fa-building"></i></span>
                    <span class="sidebar-menu-text">Customers</span>
                </a>
            </li>
            <li class="sidebar-menu-item">
                <a class="sidebar-menu-link" th:href="@{/admin/products}" th:classappend="${#httpServletRequest != null and #strings.contains(#httpServletRequest.requestURI, '/admin/products')} ? 'active'">
                    <span class="sidebar-menu-icon"><i class="fas fa-box"></i></span>
                    <span class="sidebar-menu-text">Products</span>
                </a>
            </li>
            <li class="sidebar-menu-item">
                <a class="sidebar-menu-link" th:href="@{/admin/sales}" th:classappend="${#httpServletRequest != null and #strings.contains(#httpServletRequest.requestURI, '/admin/sales')} ? 'active'">
                    <span class="sidebar-menu-icon"><i class="fas fa-shopping-cart"></i></span>
                    <span class="sidebar-menu-text">Sales</span>
                </a>
            </li>
            <li class="sidebar-menu-item">
                <a class="sidebar-menu-link" th:href="@{/admin/sales-targets}" th:classappend="${#httpServletRequest != null and #strings.contains(#httpServletRequest.requestURI, '/admin/sales-targets')} ? 'active'">
                    <span class="sidebar-menu-icon"><i class="fas fa-bullseye"></i></span>
                    <span class="sidebar-menu-text">Sales Targets</span>
                </a>
            </li>
            <li class="sidebar-menu-item">
                <a class="sidebar-menu-link" th:href="@{/admin/inquiries}" th:classappend="${#httpServletRequest != null and #strings.contains(#httpServletRequest.requestURI, '/admin/inquiries')} ? 'active'">
                    <span class="sidebar-menu-icon"><i class="fas fa-envelope-open-text"></i></span>
                    <span class="sidebar-menu-text">Inquiry</span>
                </a>
            </li>

                <a class="sidebar-menu-link" th:href="@{/admin/transactions}" th:classappend="${#httpServletRequest != null and #strings.contains(#httpServletRequest.requestURI, '/admin/transactions')} ? 'active'">
                    <span class="sidebar-menu-icon"><i class="fas fa-receipt"></i></span>
                    <span class="sidebar-menu-text">Transactions</span>
                </a>
            </li>
            <li class="sidebar-menu-item">
                <a class="sidebar-menu-link" th:href="@{/admin/salary-management}" th:classappend="${#httpServletRequest != null and #strings.contains(#httpServletRequest.requestURI, '/admin/salary-management')} ? 'active'">
                    <span class="sidebar-menu-icon"><i class="fas fa-money-bill-wave"></i></span>
                    <span class="sidebar-menu-text">Salary Management</span>
                </a>
            </li>
        </ul>
    </aside>
</html>
