<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="sidebar">
    <aside class="sidebar" id="sidebar">
        <button class="sidebar-toggle" onclick="toggleSidebar()">
            <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
            </svg>
        </button>
        
        <ul class="sidebar-menu">
            <li class="sidebar-menu-item">
                <a class="sidebar-menu-link" th:href="@{/}" th:classappend="${#httpServletRequest != null and (#httpServletRequest.requestURI == '/' or #httpServletRequest.requestURI == '')} ? 'active'">
                    <span class="sidebar-menu-icon">📊</span>
                    <span class="sidebar-menu-text">Dashboard</span>
                </a>
            </li>
            
            <li class="sidebar-menu-group">
                <div class="sidebar-menu-group-title">Management</div>
            </li>
            
            <li class="sidebar-menu-item">
                <a class="sidebar-menu-link" th:href="@{/admin/admins}" th:classappend="${#httpServletRequest != null and #strings.contains(#httpServletRequest.requestURI, '/admin/admins')} ? 'active'">
                    <span class="sidebar-menu-icon">👥</span>
                    <span class="sidebar-menu-text">Admins</span>
                </a>
            </li>
            <li class="sidebar-menu-item">
                <a class="sidebar-menu-link" th:href="@{/employees}" th:classappend="${#httpServletRequest != null and #strings.contains(#httpServletRequest.requestURI, '/employees')} ? 'active'">
                    <span class="sidebar-menu-icon">👤</span>
                    <span class="sidebar-menu-text">Employees</span>
                </a>
            </li>
            <li class="sidebar-menu-item">
                <a class="sidebar-menu-link" th:href="@{/attendances}" th:classappend="${#httpServletRequest != null and #strings.contains(#httpServletRequest.requestURI, '/attendances')} ? 'active'">
                    <span class="sidebar-menu-icon">📅</span>
                    <span class="sidebar-menu-text">Attendance</span>
                </a>
            </li>
            
            <li class="sidebar-menu-group">
                <div class="sidebar-menu-group-title">Business</div>
            </li>
            
            <li class="sidebar-menu-item">
                <a class="sidebar-menu-link" th:href="@{/customers}" th:classappend="${#httpServletRequest != null and #strings.contains(#httpServletRequest.requestURI, '/customers')} ? 'active'">
                    <span class="sidebar-menu-icon">🏢</span>
                    <span class="sidebar-menu-text">Customers</span>
                </a>
            </li>
            <li class="sidebar-menu-item">
                <a class="sidebar-menu-link" th:href="@{/sales}" th:classappend="${#httpServletRequest != null and #strings.contains(#httpServletRequest.requestURI, '/sales')} ? 'active'">
                    <span class="sidebar-menu-icon">💼</span>
                    <span class="sidebar-menu-text">Sales</span>
                </a>
            </li>
            <li class="sidebar-menu-item">
                <a class="sidebar-menu-link" th:href="@{/admin/sales-targets}" th:classappend="${#httpServletRequest != null and #strings.contains(#httpServletRequest.requestURI, '/admin/sales-targets')} ? 'active'">
                    <span class="sidebar-menu-icon">🎯</span>
                    <span class="sidebar-menu-text">Sales Targets</span>
                </a>
            </li>
        </ul>
    </aside>
</html>
