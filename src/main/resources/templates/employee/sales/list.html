<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales - Employee Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="dashboard-wrapper">
        <header class="top-header">
            <div class="header-left">
                <button class="mobile-menu-toggle" onclick="toggleMobileSidebar()" title="Toggle Sidebar">
                    <i class="fas fa-bars"></i>
                </button>
                <button class="sidebar-expand-toggle" onclick="toggleSidebar()" title="Expand/Collapse Sidebar">
                    <i class="fas fa-bars"></i>
                </button>
            </div>
            <div class="company-name">Potens Green</div>
            <form th:action="@{/logout}" method="post" style="display: inline;">
                <button type="submit" class="logout-btn">Logout</button>
            </form>
        </header>
        <div th:replace="~{fragments/employee-sidebar :: sidebar}"></div>
        <main class="main-content">
            <div class="container">
        <div th:if="${message}" class="alert alert-success">
            <span th:text="${message}"></span>
        </div>
        <div th:if="${error}" class="alert alert-danger">
            <span th:text="${error}"></span>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1>Sales</h1>
            <a th:href="@{/employee/sales/new}" class="btn btn-primary">Add New Sale</a>
        </div>

        <form th:action="@{/employee/sales}" method="get" class="search-form mb-3">
            <input type="text" name="search" class="form-control" placeholder="Search by customer or product..." th:value="${search}">
            <button type="submit" class="btn btn-primary">Search</button>
            <a th:href="@{/employee/sales}" class="btn btn-secondary">Clear</a>
        </form>

        <div class="card">
            <div class="card-body">
                <table class="table" th:if="${sales != null and !sales.isEmpty()}">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Customer</th>
                            <th>Product</th>
                            <th>Quantity</th>
                            <th>Total Amount</th>
                            <th>Paid</th>
                            <th>Remaining</th>
                            <th>Status</th>
                            <th>Commission</th>
                            <th>View</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="sale : ${sales}">
                            <td th:text="${#temporals.format(sale.saleDate, 'yyyy-MM-dd')}">Date</td>
                            <td th:text="${sale.customer != null ? sale.customer.contactPerson : '-'}">Customer</td>
                            <td th:text="${sale.productName != null ? sale.productName : (sale.product != null ? sale.product.name : '-')}">Product</td>
                            <td th:text="${sale.quantity}">1</td>
                            <td>₹<span th:text="${#numbers.formatDecimal(sale.totalAmount, 0, 'COMMA', 2, 'POINT')}">0.00</span></td>
                            <td>₹<span th:text="${sale.paidAmount != null ? #numbers.formatDecimal(sale.paidAmount, 0, 'COMMA', 2, 'POINT') : '0.00'}">0.00</span></td>
                            <td>₹<span th:text="${sale.remainingAmount != null ? #numbers.formatDecimal(sale.remainingAmount, 0, 'COMMA', 2, 'POINT') : (sale.totalAmount != null ? #numbers.formatDecimal(sale.totalAmount, 0, 'COMMA', 2, 'POINT') : '0.00')}">0.00</span></td>
                            <td>
                                <span class="badge" 
                                      th:classappend="${sale.status == 'COMPLETED'} ? 'badge-success' : 
                                                      (${sale.status == 'PARTIAL'} ? 'badge-warning' : 
                                                      (${sale.status == 'PENDING'} ? 'badge-info' : 'badge-danger'))"
                                      th:text="${sale.status}">PENDING</span>
                            </td>
                            <td>
                                <span th:if="${sale.commissionAmount != null and sale.commissionAmount.compareTo(new java.math.BigDecimal('0')) > 0}" 
                                      class="text-success">₹<span th:text="${#numbers.formatDecimal(sale.commissionAmount, 0, 'COMMA', 2, 'POINT')}">0.00</span></span>
                                <span th:if="${sale.commissionAmount == null or sale.commissionAmount.compareTo(new java.math.BigDecimal('0')) == 0}" 
                                      class="text-muted">-</span>
                            </td>
                            <td>
                                <a th:href="@{/employee/sales/view/{id}(id=${sale.id})}" class="btn btn-info btn-sm">
                                    <i class="fas fa-eye"></i> View Details
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
                <div class="empty-state" th:if="${sales == null or sales.isEmpty()}">
                    <p>No sales found.</p>
                    <a th:href="@{/employee/sales/new}" class="btn btn-primary mt-3">Add First Sale</a>
                </div>
            </div>
        </div>
            </div>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/sidebar.js}"></script>
</body>
</html>
