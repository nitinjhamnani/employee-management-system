<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${sale.id != null ? 'Edit Sale' : 'Add Sale'}">Sale Form - Employee Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="dashboard-wrapper">
                <div th:replace="~{fragments/employee-header :: header}"></div>

        <div th:replace="~{fragments/employee-sidebar :: sidebar}"></div>

        <main class="main-content">
            <div class="container">
        <div th:if="${message}" class="alert alert-success">
            <span th:text="${message}"></span>
        </div>
        <div th:if="${error}" class="alert alert-danger">
            <span th:text="${error}"></span>
        </div>
        <h1 class="mb-4" th:text="${sale.id != null ? 'Edit Sale' : 'Add New Sale'}">Add Sale</h1>

        <div class="card">
            <div class="card-body">
                <form th:action="@{/employee/sales/save}" th:object="${sale}" method="post">
                    <input type="hidden" th:field="*{id}">
                    
                    <div class="row">
                        <div class="col-md-6">
                                <div class="form-group mb-3">
                                    <label class="form-label">Customer *</label>
                                    <select class="form-select" name="customerId" id="customerId" required>
                                        <option value="">Select Customer</option>
                                        <option th:each="cust : ${customers}" 
                                                th:value="${cust.id}" 
                                                th:text="${cust.contactPerson + ' (' + cust.phone + ')'}"
                                                th:selected="${sale != null and sale.customer != null and sale.customer.id == cust.id}"></option>
                                    </select>
                                    <span class="text-danger" th:if="${#fields.hasErrors('customer')}" th:errors="*{customer}"></span>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group mb-3">
                                <label class="form-label">Sale Date *</label>
                                <input type="date" class="form-control" th:field="*{saleDate}" required>
                                <span class="text-danger" th:if="${#fields.hasErrors('saleDate')}" th:errors="*{saleDate}"></span>
                            </div>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6">
                            <div class="form-group mb-3">
                                <label class="form-label">Product *</label>
                                <select class="form-select" name="productId" id="productId" required onchange="updateProductPrice()">
                                    <option value="">Select Product</option>
                                    <option th:each="prod : ${products}" 
                                            th:value="${prod.id}" 
                                            th:data-price="${prod.unitPrice}"
                                            th:text="${prod.name + ' (' + prod.productId + ')'}"
                                            th:selected="${sale != null and sale.product != null and sale.product.id == prod.id}"></option>
                                </select>
                                <span class="text-danger" th:if="${#fields.hasErrors('product')}" th:errors="*{product}"></span>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group mb-3">
                                <label class="form-label">Quantity *</label>
                                <input type="number" class="form-control" th:field="*{quantity}" min="1" required onchange="calculateTotal()">
                                <span class="text-danger" th:if="${#fields.hasErrors('quantity')}" th:errors="*{quantity}"></span>
                            </div>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6">
                            <div class="form-group mb-3">
                                <label class="form-label">Unit Price (₹)</label>
                                <input type="text" class="form-control" th:field="*{unitPrice}" readonly id="unitPrice">
                                <small class="text-muted">Set automatically from product</small>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group mb-3">
                                <label class="form-label">Total Amount (₹)</label>
                                <input type="text" class="form-control" th:field="*{totalAmount}" readonly id="totalAmount">
                                <small class="text-muted">Calculated automatically (Quantity × Unit Price)</small>
                            </div>
                        </div>
                    </div>

                    <div class="form-group mb-3">
                        <label class="form-label">Payment Status *</label>
                        <select class="form-select" name="paymentStatus" required id="statusSelect" onchange="togglePaymentFields()">
                            <option value="PENDING">PENDING</option>
                            <option value="PARTIAL">PARTIAL</option>
                            <option value="COMPLETED">COMPLETED</option>
                        </select>
                    </div>

                    <div id="paymentSection" style="display: none;">
                        <div class="card mb-3">
                            <div class="card-header bg-info text-white">
                                <i class="fas fa-money-bill-wave"></i> Payment Details
                            </div>
                            <div class="card-body">
                                <div class="form-group mb-3">
                                    <label class="form-label">Payment Amount (₹) *</label>
                                    <input type="number" class="form-control" name="paymentAmount" step="0.01" min="0.01" 
                                           id="paymentAmount" 
                                           onchange="validatePaymentAmount()"
                                           placeholder="Enter payment amount">
                                    <small class="text-muted" id="paymentAmountHelp">Enter the amount being paid now</small>
                                    <div id="paymentAmountError" class="text-danger" style="display: none;"></div>
                                </div>

                                <div class="form-group mb-3">
                                    <label class="form-label">Transaction Mode *</label>
                                    <select class="form-select" name="transactionMode" id="transactionMode" onchange="toggleTransactionId()">
                                        <option value="">Select Transaction Mode</option>
                                        <option value="CASH">Cash</option>
                                        <option value="UPI">UPI</option>
                                        <option value="BANK_TRANSFER">Bank Transfer</option>
                                    </select>
                                </div>

                                <div class="form-group mb-3" id="transactionIdGroup" style="display: none;">
                                    <label class="form-label">Transaction ID</label>
                                    <input type="text" class="form-control" name="transactionId" 
                                           placeholder="Enter transaction ID/Reference number"
                                           id="transactionId">
                                    <small class="text-muted">Required for UPI and Bank Transfer</small>
                                </div>

                                <div class="form-group mb-3" id="dueDateGroup" style="display: none;">
                                    <label class="form-label">Due Date (for remaining amount)</label>
                                    <input type="date" class="form-control" name="dueDate" 
                                           th:min="${#temporals.format(#temporals.createToday(), 'yyyy-MM-dd')}">
                                    <small class="text-muted">Set due date if payment is partial</small>
                                </div>

                                <div class="form-group mb-3">
                                    <label class="form-label">Payment Notes</label>
                                    <textarea class="form-control" name="paymentNotes" rows="2" placeholder="Optional notes about this payment"></textarea>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="form-group mb-3">
                        <label class="form-label">Notes</label>
                        <textarea class="form-control" rows="2" th:field="*{notes}"></textarea>
                    </div>

                    <div class="mt-4">
                        <button type="submit" class="btn btn-primary">Save Sale</button>
                        <a th:href="@{/employee/sales}" class="btn btn-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/sidebar.js}"></script>
    <script>
        function updateProductPrice() {
            const productSelect = document.getElementById('productId');
            const unitPriceInput = document.getElementById('unitPrice');
            const selectedOption = productSelect.options[productSelect.selectedIndex];
            
            if (selectedOption.value) {
                const price = selectedOption.getAttribute('data-price');
                unitPriceInput.value = price;
                calculateTotal();
            }
        }
        
        function calculateTotal() {
            const quantity = parseFloat(document.querySelector('[name="quantity"]').value) || 0;
            const unitPrice = parseFloat(document.getElementById('unitPrice').value) || 0;
            const total = quantity * unitPrice;
            
            document.getElementById('totalAmount').value = total.toFixed(2);
        }
        
        // Initialize on page load
        document.addEventListener('DOMContentLoaded', function() {
            calculateTotal();
            togglePaymentFields();
        });
        
        function togglePaymentFields() {
            const status = document.getElementById('statusSelect').value;
            const paymentSection = document.getElementById('paymentSection');
            const dueDateGroup = document.getElementById('dueDateGroup');
            const paymentAmountInput = document.getElementById('paymentAmount');
            const paymentAmountHelp = document.getElementById('paymentAmountHelp');
            const totalAmount = parseFloat(document.getElementById('totalAmount').value) || 0;
            
            if (status === 'COMPLETED' || status === 'PARTIAL') {
                paymentSection.style.display = 'block';
                
                if (status === 'COMPLETED') {
                    // Auto-populate with total amount and make readonly
                    paymentAmountInput.value = totalAmount.toFixed(2);
                    paymentAmountInput.setAttribute('readonly', 'readonly');
                    paymentAmountInput.classList.add('bg-light');
                    paymentAmountHelp.textContent = 'Payment amount equals total amount (auto-filled for completed status)';
                    dueDateGroup.style.display = 'none';
                } else if (status === 'PARTIAL') {
                    // Allow editing for partial payment
                    paymentAmountInput.removeAttribute('readonly');
                    paymentAmountInput.classList.remove('bg-light');
                    paymentAmountInput.value = '';
                    paymentAmountHelp.textContent = 'Enter the amount being paid now (partial payment)';
                    dueDateGroup.style.display = 'block';
                }
            } else {
                paymentSection.style.display = 'none';
                paymentAmountInput.removeAttribute('readonly');
                paymentAmountInput.classList.remove('bg-light');
            }
        }
        
        function validatePaymentAmount() {
            const paymentAmount = parseFloat(document.getElementById('paymentAmount').value) || 0;
            const totalAmount = parseFloat(document.getElementById('totalAmount').value) || 0;
            const errorDiv = document.getElementById('paymentAmountError');
            const status = document.getElementById('statusSelect').value;
            
            if (status === 'COMPLETED' && paymentAmount !== totalAmount) {
                errorDiv.textContent = 'For COMPLETED status, payment amount must equal total amount';
                errorDiv.style.display = 'block';
            } else if (paymentAmount > totalAmount) {
                errorDiv.textContent = 'Payment amount cannot exceed total amount';
                errorDiv.style.display = 'block';
            } else {
                errorDiv.style.display = 'none';
            }
        }
        
        function toggleTransactionId() {
            const transactionMode = document.getElementById('transactionMode').value;
            const transactionIdGroup = document.getElementById('transactionIdGroup');
            const transactionIdInput = document.getElementById('transactionId');
            
            if (transactionMode === 'UPI' || transactionMode === 'BANK_TRANSFER') {
                transactionIdGroup.style.display = 'block';
                transactionIdInput.setAttribute('required', 'required');
            } else {
                transactionIdGroup.style.display = 'none';
                transactionIdInput.removeAttribute('required');
                transactionIdInput.value = '';
            }
        }
        
        // Validate form before submission
        document.querySelector('form').addEventListener('submit', function(e) {
            const status = document.getElementById('statusSelect').value;
            const paymentSection = document.getElementById('paymentSection');
            
            if (paymentSection.style.display === 'block') {
                const paymentAmount = document.getElementById('paymentAmount').value;
                const transactionMode = document.getElementById('transactionMode').value;
                const transactionId = document.getElementById('transactionId').value;
                const totalAmount = document.getElementById('totalAmount').value;
                
                if (!paymentAmount || parseFloat(paymentAmount) <= 0) {
                    e.preventDefault();
                    alert('Payment amount is required when status is COMPLETED or PARTIAL');
                    return false;
                }
                
                if (!transactionMode) {
                    e.preventDefault();
                    alert('Transaction mode is required');
                    return false;
                }
                
                if ((transactionMode === 'UPI' || transactionMode === 'BANK_TRANSFER') && !transactionId) {
                    e.preventDefault();
                    alert('Transaction ID is required for ' + transactionMode);
                    return false;
                }
                
                if (status === 'COMPLETED' && parseFloat(paymentAmount) !== parseFloat(totalAmount)) {
                    e.preventDefault();
                    alert('For COMPLETED status, payment amount must equal total amount');
                    return false;
                }
            }
        });
    </script>
</body>
</html>
