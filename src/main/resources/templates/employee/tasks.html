<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Tasks - Employee Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" th:href="@{/employee/dashboard}">Employee Portal</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/employee/dashboard}">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/employee/tasks}">Tasks</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/employee/sales-target}">Sales Target</a>
                    </li>
                    <li class="nav-item">
                        <form th:action="@{/logout}" method="post" style="display: inline;">
                            <button type="submit" class="btn btn-link nav-link" style="border: none; background: none; color: rgba(255, 255, 255, 0.9);">Logout</button>
                        </form>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        <div th:if="${message}" class="alert alert-success" role="alert">
            <span th:text="${message}"></span>
        </div>
        <div th:if="${error}" class="alert alert-danger" role="alert">
            <span th:text="${error}"></span>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-4 mt-4">
            <h1>My Tasks</h1>
            <a th:href="@{/employee/dashboard}" class="btn btn-secondary">Back to Dashboard</a>
        </div>

        <div class="card">
            <div class="card-body">
                <div th:if="${tasks != null and !tasks.isEmpty()}">
                    <div class="table-responsive">
                        <table class="table">
                            <thead>
                                <tr>
                                    <th>Title</th>
                                    <th>Description</th>
                                    <th>Status</th>
                                    <th>Priority</th>
                                    <th>Due Date</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="task : ${tasks}">
                                    <td th:text="${task.title}">Task Title</td>
                                    <td th:text="${task.description != null ? task.description : '-'}">Description</td>
                                    <td>
                                        <span class="badge" 
                                              th:classappend="${task.status == 'COMPLETED'} ? 'badge-success' : 
                                                              (${task.status == 'IN_PROGRESS'} ? 'badge-info' : 
                                                               (${task.status == 'OPEN'} ? 'badge-warning' : 'badge-secondary'))"
                                              th:text="${task.status}">OPEN</span>
                                    </td>
                                    <td>
                                        <span class="badge" 
                                              th:classappend="${task.priority == 'URGENT'} ? 'badge-danger' : 
                                                              (${task.priority == 'HIGH'} ? 'badge-warning' : 
                                                               (${task.priority == 'MEDIUM'} ? 'badge-info' : 'badge-secondary'))"
                                              th:text="${task.priority}">MEDIUM</span>
                                    </td>
                                    <td th:text="${task.dueDate != null ? #temporals.format(task.dueDate, 'yyyy-MM-dd') : '-'}">-</td>
                                    <td>
                                        <div th:if="${task.status != 'COMPLETED'}" class="d-flex gap-2">
                                            <form th:action="@{/employee/tasks/{id}/update-status(id=${task.id})}" method="post" style="display: inline;">
                                                <input type="hidden" name="status" value="IN_PROGRESS">
                                                <button type="submit" class="btn btn-sm btn-info" th:if="${task.status == 'OPEN'}">Start</button>
                                            </form>
                                            <form th:action="@{/employee/tasks/{id}/update-status(id=${task.id})}" method="post" style="display: inline;">
                                                <input type="hidden" name="status" value="COMPLETED">
                                                <button type="submit" class="btn btn-sm btn-success">Complete</button>
                                            </form>
                                        </div>
                                        <span th:if="${task.status == 'COMPLETED'}" class="text-muted">Completed</span>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
                <div th:if="${tasks == null or tasks.isEmpty()}" class="empty-state">
                    <p>No tasks assigned to you.</p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
