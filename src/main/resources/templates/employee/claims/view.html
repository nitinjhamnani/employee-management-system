<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claim Details - Employee Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="dashboard-wrapper">
        <div th:replace="~{fragments/employee-header :: header}"></div>
        <div th:replace="~{fragments/employee-sidebar :: sidebar}"></div>
        <main class="main-content">
            <div class="container">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h1><i class="fas fa-file-invoice-dollar"></i> Claim Details</h1>
                    <a th:href="@{/employee/claims}" class="btn btn-secondary">Back to List</a>
                </div>

                <div class="card">
                    <div class="card-body">
                        <table class="table">
                            <tr>
                                <th>Claim Type:</th>
                                <td th:text="${claim.claimType}"></td>
                            </tr>
                            <tr>
                                <th>Claim Date:</th>
                                <td th:text="${#temporals.format(claim.claimDate, 'yyyy-MM-dd')}"></td>
                            </tr>
                            <tr>
                                <th>Amount:</th>
                                <td th:text="${'₹' + #numbers.formatDecimal(claim.amount, 0, 'COMMA', 2, 'POINT')}"></td>
                            </tr>
                            <tr>
                                <th>Description:</th>
                                <td th:text="${claim.description}"></td>
                            </tr>
                            <tr>
                                <th>Status:</th>
                                <td>
                                    <span class="badge"
                                          th:classappend="${claim.status == 'APPROVED'} ? 'badge-success' :
                                                          (${claim.status == 'REJECTED'} ? 'badge-danger' : 'badge-warning')"
                                          th:text="${claim.status}">PENDING</span>
                                </td>
                            </tr>
                            <tr th:if="${claim.billAttachment != null and !claim.billAttachment.isEmpty()}">
                                <th>Bill Attachment:</th>
                                <td th:text="${claim.billAttachment}"></td>
                            </tr>
                            <tr th:if="${claim.remarks != null and !claim.remarks.isEmpty()}">
                                <th>Remarks:</th>
                                <td th:text="${claim.remarks}"></td>
                            </tr>
                            <tr th:if="${claim.approvedBy != null}">
                                <th>Approved/Rejected By:</th>
                                <td th:text="${claim.approvedBy.fullName}"></td>
                            </tr>
                            <tr th:if="${claim.approvedAt != null}">
                                <th>Approved/Rejected At:</th>
                                <td th:text="${#temporals.format(claim.approvedAt, 'yyyy-MM-dd HH:mm')}"></td>
                            </tr>
                        </table>
                    </div>
                </div>
                
                <!-- Approval Actions (for Managers) -->
                <div class="card mb-4" th:if="${canApprove}">
                    <div class="card-header">
                        <h5 class="mb-0">Manager Actions</h5>
                    </div>
                    <div class="card-body">
                        <form th:action="@{/employee/claims/approve/{id}(id=${claim.id})}" method="post" class="mb-3">
                            <div class="mb-3">
                                <label class="form-label">Remarks (Optional)</label>
                                <textarea name="remarks" class="form-control" rows="3"></textarea>
                            </div>
                            <button type="submit" class="btn btn-success">
                                <i class="fas fa-check"></i> Approve Claim
                            </button>
                        </form>
                        
                        <form th:action="@{/employee/claims/reject/{id}(id=${claim.id})}" method="post">
                            <div class="mb-3">
                                <label class="form-label">Remarks (Required)</label>
                                <textarea name="remarks" class="form-control" rows="3" required></textarea>
                            </div>
                            <button type="submit" class="btn btn-danger">
                                <i class="fas fa-times"></i> Reject Claim
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/sidebar.js}"></script>
</body>
</html>
