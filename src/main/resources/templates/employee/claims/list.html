<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Claims - Employee Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="dashboard-wrapper">
        <header class="top-header">
            <button class="mobile-menu-toggle" onclick="document.getElementById('sidebar').classList.toggle('mobile-open')">
                <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                </svg>
            </button>
            <div class="company-name">Potens Green</div>
            <form th:action="@{/logout}" method="post" style="display: inline;">
                <button type="submit" class="logout-btn">Logout</button>
            </form>
        </header>
        <div th:replace="~{fragments/employee-sidebar :: sidebar}"></div>
        <main class="main-content">
            <div class="container">
        <div th:if="${message}" class="alert alert-success mt-4" role="alert">
            <span th:text="${message}"></span>
        </div>
        <div th:if="${error}" class="alert alert-danger mt-4" role="alert">
            <span th:text="${error}"></span>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-4 mt-4">
            <h1>My Claims</h1>
            <a th:href="@{/employee/claims/new}" class="btn btn-primary">Submit New Claim</a>
        </div>

        <div class="card">
            <div class="card-body">
                <div th:if="${claims != null and !claims.isEmpty()}">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Claim Date</th>
                                <th>Claim Type</th>
                                <th>Description</th>
                                <th>Amount</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="claim : ${claims}">
                                <td th:text="${#temporals.format(claim.claimDate, 'yyyy-MM-dd')}"></td>
                                <td th:text="${claim.claimType}"></td>
                                <td th:text="${#strings.abbreviate(claim.description, 50)}"></td>
                                <td th:text="${'$' + #numbers.formatDecimal(claim.amount, 0, 'COMMA', 2, 'POINT')}"></td>
                                <td>
                                    <span class="badge" 
                                          th:classappend="${claim.status == 'APPROVED'} ? 'badge-success' : 
                                                          (${claim.status == 'REJECTED'} ? 'badge-danger' : 'badge-warning')"
                                          th:text="${claim.status}">PENDING</span>
                                </td>
                                <td>
                                    <a th:href="@{/employee/claims/view/{id}(id=${claim.id})}" class="btn btn-sm btn-info">View</a>
                                    <a th:if="${claim.status == 'PENDING'}" 
                                       th:href="@{/employee/claims/delete/{id}(id=${claim.id})}" 
                                       class="btn btn-sm btn-danger"
                                       onclick="return confirm('Are you sure you want to delete this claim?')">Delete</a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <div th:if="${claims == null or claims.isEmpty()}" class="text-center py-4">
                    <p>No claims found. <a th:href="@{/employee/claims/new}">Submit your first claim</a></p>
                </div>
            </div>
        </div>
    </div>

        </div>
            </div>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/sidebar.js}"></script>
</body>
</html>
