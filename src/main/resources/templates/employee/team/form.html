<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${employee.id != null ? 'Edit ' + employeeTypeLabel : 'Add ' + employeeTypeLabel}">Team Form - Employee Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="dashboard-wrapper">
                <div th:replace="~{fragments/employee-header :: header}"></div>

        <div th:replace="~{fragments/employee-sidebar :: sidebar}"></div>

        <main class="main-content">
            <div class="container">
        <div th:if="${error}" class="alert alert-danger">
            <span th:text="${error}"></span>
        </div>
        <h1 class="mb-4" th:text="${employee.id != null ? 'Edit ' + employeeTypeLabel : 'Add New ' + employeeTypeLabel}">Add Team Member</h1>

        <div class="card">
            <div class="card-body">
                <form th:action="${saveUrl}" th:object="${employee}" method="post">
                    <input type="hidden" th:field="*{id}">
                    <input type="hidden" th:field="*{hierarchyLevel}" th:if="${employeeType != null}">
                    
                    <div class="row">
                        <div class="col-md-6">
                            <div class="form-group mb-3">
                                <label class="form-label">First Name *</label>
                                <input type="text" class="form-control" th:field="*{firstName}" required>
                                <span class="text-danger" th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}"></span>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group mb-3">
                                <label class="form-label">Last Name *</label>
                                <input type="text" class="form-control" th:field="*{lastName}" required>
                                <span class="text-danger" th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}"></span>
                            </div>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6">
                            <div class="form-group mb-3">
                                <label class="form-label">Email *</label>
                                <input type="email" class="form-control" th:field="*{email}" required>
                                <span class="text-danger" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></span>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group mb-3">
                                <label class="form-label">Phone *</label>
                                <input type="text" class="form-control" th:field="*{phone}" required>
                                <span class="text-danger" th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}"></span>
                            </div>
                        </div>
                    </div>

                    <div class="alert alert-info" th:if="${employee.id == null}">
                        <strong>Note:</strong> Employee ID (username) will be automatically generated starting with "PG" followed by 6 alphanumeric characters. The default password will be the same as the Employee ID.
                    </div>
                    <div class="alert alert-info" th:if="${employee.id != null}">
                        <strong>Employee ID:</strong> <span th:text="${employee.username}">-</span>
                    </div>

                    <div class="row">
                        <div class="col-md-4">
                            <div class="form-group mb-3">
                                <label class="form-label">State *</label>
                                <input type="text" class="form-control" th:field="*{state}" required placeholder="e.g., Maharashtra">
                                <span class="text-danger" th:if="${#fields.hasErrors('state')}" th:errors="*{state}"></span>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="form-group mb-3">
                                <label class="form-label">City *</label>
                                <input type="text" class="form-control" th:field="*{city}" required placeholder="e.g., Mumbai">
                                <span class="text-danger" th:if="${#fields.hasErrors('city')}" th:errors="*{city}"></span>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="form-group mb-3">
                                <label class="form-label">Area *</label>
                                <input type="text" class="form-control" th:field="*{area}" required placeholder="e.g., Andheri">
                                <span class="text-danger" th:if="${#fields.hasErrors('area')}" th:errors="*{area}"></span>
                            </div>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6">
                            <div class="form-group mb-3">
                                <label class="form-label">Hierarchy Level *</label>
                                <div th:if="${employeeType != null}" class="form-control-plaintext">
                                    <span class="badge bg-secondary" th:text="${employee.hierarchyLevel}">-</span>
                                </div>
                                <div th:if="${employeeType == null}">
                                    <select class="form-select" th:field="*{hierarchyLevel}" required>
                                        <option value="">-- Select Hierarchy Level --</option>
                                        <option value="PROMOTER">Promoter</option>
                                        <option value="ZONAL_HEAD">Zonal Head</option>
                                        <option value="CLUSTER_HEAD">Cluster Head</option>
                                        <option value="AREA_SALES_MANAGER">Area Sales Manager</option>
                                    </select>
                                </div>
                                <span class="text-danger" th:if="${#fields.hasErrors('hierarchyLevel')}" th:errors="*{hierarchyLevel}"></span>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group mb-3">
                                <label class="form-label">Reporting Manager</label>
                                <select class="form-select" name="reportingManagerId">
                                    <option value="">-- No Reporting Manager --</option>
                                    <option th:each="manager : ${managers}" 
                                            th:value="${manager.id}" 
                                            th:text="${manager.fullName + ' (' + manager.hierarchyLevel + ')'}"
                                            th:selected="${employee.reportingManager != null and employee.reportingManager.id == manager.id}">
                                    </option>
                                </select>
                                <small class="form-text text-muted">Select the manager this employee reports to (must be at a higher hierarchy level)</small>
                            </div>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6">
                            <div class="form-group mb-3">
                                <label class="form-label">Hire Date *</label>
                                <input type="date" class="form-control" th:field="*{hireDate}" required>
                                <span class="text-danger" th:if="${#fields.hasErrors('hireDate')}" th:errors="*{hireDate}"></span>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group mb-3">
                                <label class="form-label">Status *</label>
                                <select class="form-select" th:field="*{status}" required>
                                    <option value="ACTIVE">ACTIVE</option>
                                    <option value="INACTIVE">INACTIVE</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="mt-4">
                        <button type="submit" class="btn btn-primary">Save</button>
                        <a th:href="${listUrl}" class="btn btn-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/sidebar.js}"></script>
</body>
</html>
