<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leave Request Details - Employee Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="dashboard-wrapper">
        <div th:replace="~{fragments/employee-header :: header}"></div>
        <div th:replace="~{fragments/employee-sidebar :: sidebar}"></div>
        <main class="main-content">
            <div class="container">
                <div th:if="${message}" class="alert alert-success mt-4" role="alert">
                    <span th:text="${message}"></span>
                </div>
                <div th:if="${error}" class="alert alert-danger mt-4" role="alert">
                    <span th:text="${error}"></span>
                </div>

                <div class="d-flex justify-content-between align-items-center mb-4 mt-4">
                    <h1><i class="fas fa-calendar-times"></i> Leave Request Details</h1>
                    <div>
                        <a th:href="@{/employee/leave-requests/pending-approvals}" class="btn btn-warning" th:if="${leaveRequest.assignedTo != null and leaveRequest.assignedTo.id == currentEmployee.id and leaveRequest.status == 'PENDING'}">
                            <i class="fas fa-clipboard-check"></i> Pending Approvals
                        </a>
                        <a th:href="@{/employee/leave-requests}" class="btn btn-secondary">Back to List</a>
                    </div>
                </div>

                <div class="card">
                    <div class="card-body">
                        <table class="table">
                            <tr>
                                <th>Leave Type:</th>
                                <td th:text="${leaveRequest.leaveType}"></td>
                            </tr>
                            <tr>
                                <th>Start Date:</th>
                                <td th:text="${#temporals.format(leaveRequest.startDate, 'yyyy-MM-dd')}"></td>
                            </tr>
                            <tr>
                                <th>End Date:</th>
                                <td th:text="${#temporals.format(leaveRequest.endDate, 'yyyy-MM-dd')}"></td>
                            </tr>
                            <tr>
                                <th>Number of Days:</th>
                                <td th:text="${leaveRequest.numberOfDays}"></td>
                            </tr>
                            <tr>
                                <th>Reason:</th>
                                <td th:text="${leaveRequest.reason}"></td>
                            </tr>
                            <tr>
                                <th>Status:</th>
                                <td>
                                    <span class="badge" 
                                          th:classappend="${leaveRequest.status == 'APPROVED'} ? 'badge-success' : 
                                                          (${leaveRequest.status == 'REJECTED'} ? 'badge-danger' : 
                                                          (${leaveRequest.status == 'CANCELLED'} ? 'badge-secondary' : 'badge-warning'))"
                                          th:text="${leaveRequest.status}">PENDING</span>
                                </td>
                            </tr>
                            <tr th:if="${leaveRequest.remarks != null and !leaveRequest.remarks.isEmpty()}">
                                <th>Remarks:</th>
                                <td th:text="${leaveRequest.remarks}"></td>
                            </tr>
                            <tr th:if="${leaveRequest.approvedBy != null}">
                                <th>Approved/Rejected By:</th>
                                <td th:text="${leaveRequest.approvedBy.fullName}"></td>
                            </tr>
                            <tr th:if="${leaveRequest.approvedAt != null}">
                                <th>Approved/Rejected At:</th>
                                <td th:text="${#temporals.format(leaveRequest.approvedAt, 'yyyy-MM-dd HH:mm')}"></td>
                            </tr>
                        </table>
                    </div>
                </div>
                
                <!-- Approval Actions (for Managers) -->
                <div class="card mb-4" th:if="${canApprove}">
                    <div class="card-header">
                        <h5 class="mb-0">Manager Actions</h5>
                    </div>
                    <div class="card-body">
                        <form th:action="@{/employee/leave-requests/approve/{id}(id=${leaveRequest.id})}" method="post" class="mb-3">
                            <div class="mb-3">
                                <label class="form-label">Remarks (Optional)</label>
                                <textarea name="remarks" class="form-control" rows="3"></textarea>
                            </div>
                            <button type="submit" class="btn btn-success">
                                <i class="fas fa-check"></i> Approve Leave Request
                            </button>
                        </form>
                        
                        <form th:action="@{/employee/leave-requests/reject/{id}(id=${leaveRequest.id})}" method="post">
                            <div class="mb-3">
                                <label class="form-label">Remarks (Required)</label>
                                <textarea name="remarks" class="form-control" rows="3" required></textarea>
                            </div>
                            <button type="submit" class="btn btn-danger">
                                <i class="fas fa-times"></i> Reject Leave Request
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/sidebar.js}"></script>
</body>
</html>
