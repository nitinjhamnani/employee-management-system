<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request Leave - Employee Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" th:href="@{/employee/dashboard}">Employee Portal</a>
        </div>
    </nav>

    <div class="container">
        <div th:if="${error}" class="alert alert-danger mt-4" role="alert">
            <span th:text="${error}"></span>
        </div>

        <h1 class="mb-4 mt-4">Request Leave</h1>

        <div class="card">
            <div class="card-body">
                <form th:action="@{/employee/leave-requests/save}" th:object="${leaveRequest}" method="post">
                    <input type="hidden" th:field="*{id}">
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Leave Type *</label>
                            <select class="form-select" th:field="*{leaveType}" required>
                                <option value="">Select Leave Type</option>
                                <option value="CASUAL">Casual Leave</option>
                                <option value="SICK">Sick Leave</option>
                                <option value="EARNED">Earned Leave</option>
                                <option value="MATERNITY">Maternity Leave</option>
                                <option value="PATERNITY">Paternity Leave</option>
                                <option value="UNPAID">Unpaid Leave</option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Number of Days</label>
                            <input type="number" class="form-control" th:field="*{numberOfDays}" placeholder="Will be calculated automatically">
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Start Date *</label>
                            <input type="date" class="form-control" th:field="*{startDate}" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">End Date *</label>
                            <input type="date" class="form-control" th:field="*{endDate}" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Reason *</label>
                        <textarea class="form-control" rows="4" th:field="*{reason}" required></textarea>
                    </div>

                    <div class="mt-4">
                        <button type="submit" class="btn btn-primary">Submit Leave Request</button>
                        <a th:href="@{/employee/leave-requests}" class="btn btn-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
