<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leave Requests - Employee Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="dashboard-wrapper">
                <div th:replace="~{fragments/employee-header :: header}"></div>
        <div th:replace="~{fragments/employee-sidebar :: sidebar}"></div>
        <main class="main-content">
            <div class="container">
        <div th:if="${message}" class="alert alert-success mt-4" role="alert">
            <span th:text="${message}"></span>
        </div>
        <div th:if="${error}" class="alert alert-danger mt-4" role="alert">
            <span th:text="${error}"></span>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-4 mt-4">
            <h1>Leave Requests</h1>
            <a th:href="@{/employee/leave-requests/new}" class="btn btn-primary">Request Leave</a>
        </div>

        <div class="card">
            <div class="card-body">
                <div th:if="${leaveRequests != null and !leaveRequests.isEmpty()}">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Leave Type</th>
                                <th>Start Date</th>
                                <th>End Date</th>
                                <th>Number of Days</th>
                                <th>Reason</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="leaveRequest : ${leaveRequests}">
                                <td th:text="${leaveRequest.leaveType}"></td>
                                <td th:text="${#temporals.format(leaveRequest.startDate, 'yyyy-MM-dd')}"></td>
                                <td th:text="${#temporals.format(leaveRequest.endDate, 'yyyy-MM-dd')}"></td>
                                <td th:text="${leaveRequest.numberOfDays}"></td>
                                <td th:text="${#strings.abbreviate(leaveRequest.reason, 50)}"></td>
                                <td>
                                    <span class="badge" 
                                          th:classappend="${leaveRequest.status == 'APPROVED'} ? 'badge-success' : 
                                                          (${leaveRequest.status == 'REJECTED'} ? 'badge-danger' : 
                                                          (${leaveRequest.status == 'CANCELLED'} ? 'badge-secondary' : 'badge-warning'))"
                                          th:text="${leaveRequest.status}">PENDING</span>
                                </td>
                                <td>
                                    <a th:href="@{/employee/leave-requests/view/{id}(id=${leaveRequest.id})}" class="btn btn-sm btn-info">View</a>
                                    <a th:if="${leaveRequest.status == 'PENDING'}" 
                                       th:href="@{/employee/leave-requests/cancel/{id}(id=${leaveRequest.id})}" 
                                       class="btn btn-sm btn-warning"
                                       onclick="return confirm('Are you sure you want to cancel this leave request?')">Cancel</a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <div th:if="${leaveRequests == null or leaveRequests.isEmpty()}" class="text-center py-4">
                    <p>No leave requests found. <a th:href="@{/employee/leave-requests/new}">Submit your first leave request</a></p>
                </div>
            </div>
        </div>
    </div>

        </div>
            </div>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/sidebar.js}"></script>
</body>
</html>
