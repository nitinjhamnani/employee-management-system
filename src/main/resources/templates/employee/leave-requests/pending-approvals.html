<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pending Leave Approvals - Employee Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="dashboard-wrapper">
        <div th:replace="~{fragments/employee-header :: header}"></div>
        <div th:replace="~{fragments/employee-sidebar :: sidebar}"></div>
        <main class="main-content">
            <div class="container">
                <div th:if="${message}" class="alert alert-success mt-4" role="alert">
                    <span th:text="${message}"></span>
                </div>
                <div th:if="${error}" class="alert alert-danger mt-4" role="alert">
                    <span th:text="${error}"></span>
                </div>

                <div class="d-flex justify-content-between align-items-center mb-4 mt-4">
                    <h1><i class="fas fa-calendar-check"></i> Pending Leave Approvals</h1>
                    <a th:href="@{/employee/leave-requests}" class="btn btn-secondary">My Leave Requests</a>
                </div>

                <div class="card">
                    <div class="card-body">
                        <div th:if="${pendingRequests != null and !pendingRequests.isEmpty()}">
                            <table class="table">
                                <thead>
                                    <tr>
                                        <th>Employee</th>
                                        <th>Leave Type</th>
                                        <th>Start Date</th>
                                        <th>End Date</th>
                                        <th>Days</th>
                                        <th>Reason</th>
                                        <th>Status</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="request : ${pendingRequests}">
                                        <td th:text="${request.employee.fullName}"></td>
                                        <td th:text="${request.leaveType}"></td>
                                        <td th:text="${#temporals.format(request.startDate, 'yyyy-MM-dd')}"></td>
                                        <td th:text="${#temporals.format(request.endDate, 'yyyy-MM-dd')}"></td>
                                        <td th:text="${request.numberOfDays}"></td>
                                        <td th:text="${#strings.abbreviate(request.reason, 50)}"></td>
                                        <td>
                                            <span class="badge badge-warning" th:text="${request.status}">PENDING</span>
                                        </td>
                                        <td>
                                            <a th:href="@{/employee/leave-requests/view/{id}(id=${request.id})}" class="btn btn-info btn-sm">
                                                <i class="fas fa-eye"></i> View
                                            </a>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                        <div th:if="${pendingRequests == null or pendingRequests.isEmpty()}" class="empty-state">
                            <p>No pending leave requests for approval.</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/sidebar.js}"></script>
</body>
</html>
