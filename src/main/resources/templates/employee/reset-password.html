<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Employee Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="dashboard-wrapper">
        <div th:replace="~{fragments/employee-header :: header}"></div>
        <div th:replace="~{fragments/employee-sidebar :: sidebar}"></div>
        <main class="main-content">
            <div class="container">
                <div th:if="${message}" class="alert alert-success mt-4" role="alert">
                    <span th:text="${message}"></span>
                </div>
                <div th:if="${error}" class="alert alert-danger mt-4" role="alert">
                    <span th:text="${error}"></span>
                </div>

                <div class="d-flex justify-content-between align-items-center mb-4 mt-4">
                    <h1><i class="fas fa-key"></i> Reset Password</h1>
                    <a th:href="@{/employee/profile}" class="btn btn-secondary">Back to Profile</a>
                </div>

                <div class="card">
                    <div class="card-body">
                        <form th:action="@{/employee/reset-password}" method="post">
                            <div class="mb-4">
                                <label class="form-label">Current Password *</label>
                                <input type="password" name="currentPassword" class="form-control" required autofocus>
                                <small class="form-text text-muted">Enter your current password to verify your identity.</small>
                            </div>
                            
                            <div class="mb-4">
                                <label class="form-label">New Password *</label>
                                <input type="password" name="newPassword" id="newPassword" class="form-control" required minlength="6">
                                <small class="form-text text-muted">Password must be at least 6 characters long.</small>
                            </div>
                            
                            <div class="mb-4">
                                <label class="form-label">Confirm New Password *</label>
                                <input type="password" name="confirmPassword" id="confirmPassword" class="form-control" required minlength="6">
                                <small class="form-text text-muted">Re-enter your new password to confirm.</small>
                            </div>
                            
                            <div class="mt-4">
                                <button type="submit" class="btn btn-primary">
                                    <i class="fas fa-save"></i> Reset Password
                                </button>
                                <a th:href="@{/employee/profile}" class="btn btn-secondary">Cancel</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/sidebar.js}"></script>
    <script>
        // Validate password match on form submission
        document.querySelector('form').addEventListener('submit', function(e) {
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            if (newPassword !== confirmPassword) {
                e.preventDefault();
                alert('New password and confirm password do not match!');
                return false;
            }
            
            if (newPassword.length < 6) {
                e.preventDefault();
                alert('Password must be at least 6 characters long!');
                return false;
            }
        });
    </script>
</body>
</html>
